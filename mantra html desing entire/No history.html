<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empty History</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #ffffff;
        }

        .empty-history {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 40px;
            text-align: center;
            min-height: 100vh;
        }

        .empty-history-icon {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 72px;
            height: 72px;
            margin-bottom: 24px;
            background-color: #f1f5f9;
            border-radius: 14px;
        }

        .empty-history-icon svg {
            width: 36px;
            height: 36px;
        }

        .empty-history-title {
            font-size: 22px;
            font-weight: 600;
            color: #1e293b;
            margin: 0 0 10px 0;
            line-height: 1.3;
        }

        .empty-history-subtitle {
            font-size: 15px;
            color: #64748b;
            margin: 0 0 28px 0;
            line-height: 1.5;
        }

        .empty-history-btn {
            background-color: #0ea5e9;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            padding: 13px 28px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .empty-history-btn:active {
            background-color: #0369a1;
            transform: scale(0.98);
        }

        @media (max-width: 480px) {
            .empty-history {
                padding: 60px 24px;
            }

            .empty-history-title {
                font-size: 20px;
            }

            .empty-history-subtitle {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="empty-history">
        <div class="empty-history-icon">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <polyline points="12 6 12 12 16 14"/>
            </svg>
        </div>
        <h3 class="empty-history-title">No reading history</h3>
        <p class="empty-history-subtitle">Your reading history will appear here as you read.</p>
        <button class="empty-history-btn" onclick="handleStartReading()">Start reading</button>
    </div>

    <script>
        function handleStartReading() {
            console.log('Navigate to explore/discover page');
            // Add your navigation logic here
        }
    </script>
</body>
</html>
