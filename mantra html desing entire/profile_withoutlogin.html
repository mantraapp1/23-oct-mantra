<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Mantra Novels</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Empty State Container */
        .empty-profile {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 40px;
            text-align: center;
        }

        .profile-icon {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 72px;
            height: 72px;
            margin-bottom: 24px;
            background-color: #f1f5f9;
            border-radius: 14px;
        }

        .profile-icon svg {
            width: 36px;
            height: 36px;
        }

        .empty-title {
            font-size: 22px;
            font-weight: 600;
            color: #1e293b;
            margin: 0 0 10px 0;
            line-height: 1.3;
        }

        .empty-subtitle {
            font-size: 15px;
            color: #64748b;
            margin: 0 0 28px 0;
            line-height: 1.5;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 300px;
        }

        .btn {
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            width: 100%;
        }

        .btn-primary {
            background-color: #0ea5e9;
            color: #ffffff;
        }

        .btn-primary:active {
            background-color: #0369a1;
            transform: scale(0.98);
        }

        .btn-secondary {
            background-color: #ffffff;
            color: #0ea5e9;
            border: 2px solid #0ea5e9;
        }

        .btn-secondary:active {
            background-color: #f1f5f9;
            transform: scale(0.98);
        }

        @media (max-width: 480px) {
            .empty-profile {
                padding: 40px 24px;
            }

            .empty-title {
                font-size: 20px;
            }

            .empty-subtitle {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- Empty Profile State -->
    <div class="empty-profile">
        <div class="profile-icon">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
            </svg>
        </div>
        <h3 class="empty-title">You're not logged in</h3>
        <p class="empty-subtitle">Sign in to access your profile, library, and personalized content.</p>
        
        <div class="button-group">
            <button class="btn btn-primary" onclick="handleLogin()">Log In</button>
            <button class="btn btn-secondary" onclick="handleSignUp()">Create Account</button>
        </div>
    </div>

    <script>
        function handleLogin() {
            console.log('Navigate to login page');
            // Add your login navigation logic here
        }

        function handleSignUp() {
            console.log('Navigate to sign up page');
            // Add your sign up navigation logic here
        }
    </script>
</body>
</html>
