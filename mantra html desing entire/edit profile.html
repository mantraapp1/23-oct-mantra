<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WebNovel - Edit Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="font-inter antialiased bg-white text-slate-800">
  <div class="min-h-screen flex flex-col max-w-md mx-auto bg-white">
    <div class="sticky top-0 bg-white z-40 border-b border-slate-100">
      <div class="px-4 py-3 flex items-center gap-2">
        <button class="p-2 rounded-lg hover:bg-slate-100 active:scale-95"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
        <div class="text-base font-semibold">Edit Profile</div>
        <div class="ml-auto">
          <button class="px-3 py-1.5 rounded-full bg-sky-500 text-white text-xs font-semibold">Save</button>
        </div>
      </div>
    </div>
    <div class="px-4 pt-4 pb-24 space-y-4">
      <div class="flex items-center gap-4">
        <div class="relative">
          <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?q=80&w=256&auto=format&fit=crop" alt="" class="h-16 w-16 rounded-full object-cover border border-slate-200">
          <button class="absolute -bottom-1 -right-1 h-7 w-7 rounded-full bg-sky-500 text-white flex items-center justify-center shadow"><i data-lucide="camera" class="w-4 h-4"></i></button>
        </div>
      </div>
      <div>
        <label class="block text-xs text-slate-500 mb-1">Name</label>
        <input class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-sky-500 bg-white" value="Your Name">
      </div>
      <div>
        <label class="block text-xs text-slate-500 mb-1">Username</label>
        <input class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-sky-500 bg-white" value="@you">
      </div>
      <div>
        <label class="block text-xs text-slate-500 mb-1">Bio</label>
        <textarea rows="3" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-sky-500" placeholder="Tell us about yourself..."></textarea>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs text-slate-500 mb-1">Gender</label>
          <select class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-sky-500 bg-white">
            <option>Male</option>
            <option>Female</option>
            <option>Non-binary</option>
            <option>Prefer not to say</option>
          </select>
        </div>
        <div>
          <label class="block text-xs text-slate-500 mb-1">Age</label>
          <input type="number" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-sky-500 bg-white" value="25">
        </div>
      </div>
    </div>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
