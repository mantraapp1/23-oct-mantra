<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WebNovel - Search</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="font-inter antialiased bg-white text-slate-800">
  <div class="min-h-screen flex flex-col max-w-md mx-auto bg-white">
    <div class="sticky top-0 bg-white z-40 border-b border-slate-100">
      <div class="px-4 py-3 flex items-center gap-2">
        <button class="p-2 rounded-lg hover:bg-slate-100 active:scale-95"><i data-lucide="arrow-left" class="w-5 h-5 text-slate-600"></i></button>
        <div class="relative flex-1">
          <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
          <input id="search-input" class="w-full rounded-lg border border-slate-200 pl-9 pr-3 py-2 text-sm outline-none focus:ring-2 focus:ring-sky-500 bg-white" placeholder="Search novels, authors, tags">
        </div>
      </div>
    </div>
    
    <div class="px-4 pt-5 pb-24 space-y-6">
      <!-- Recent Searches -->
      <div id="recent-searches-section">
        <div class="flex items-center justify-between mb-3">
          <div class="text-sm font-semibold">Recent searches</div>
          <button id="clear-all-btn" class="text-xs text-sky-600 font-semibold hover:text-sky-700 active:text-sky-800">Clear all</button>
        </div>
        <div id="recent-searches-list" class="space-y-2">
          <div class="flex items-center justify-between w-full p-3 rounded-lg hover:bg-slate-50 transition group">
            <button class="flex items-center gap-3 flex-1 text-left">
              <i data-lucide="clock" class="w-4 h-4 text-slate-400"></i>
              <span class="text-sm text-slate-700">fantasy romance</span>
            </button>
            <button class="remove-item p-1.5 hover:bg-slate-200 rounded-lg flex-shrink-0">
              <i data-lucide="x" class="w-4 h-4 text-slate-400"></i>
            </button>
          </div>
          
          <div class="flex items-center justify-between w-full p-3 rounded-lg hover:bg-slate-50 transition group">
            <button class="flex items-center gap-3 flex-1 text-left">
              <i data-lucide="clock" class="w-4 h-4 text-slate-400"></i>
              <span class="text-sm text-slate-700">time travel</span>
            </button>
            <button class="remove-item p-1.5 hover:bg-slate-200 rounded-lg flex-shrink-0">
              <i data-lucide="x" class="w-4 h-4 text-slate-400"></i>
            </button>
          </div>
          
          <div class="flex items-center justify-between w-full p-3 rounded-lg hover:bg-slate-50 transition group">
            <button class="flex items-center gap-3 flex-1 text-left">
              <i data-lucide="clock" class="w-4 h-4 text-slate-400"></i>
              <span class="text-sm text-slate-700">space opera</span>
            </button>
            <button class="remove-item p-1.5 hover:bg-slate-200 rounded-lg flex-shrink-0">
              <i data-lucide="x" class="w-4 h-4 text-slate-400"></i>
            </button>
          </div>
          
          <div class="flex items-center justify-between w-full p-3 rounded-lg hover:bg-slate-50 transition group">
            <button class="flex items-center gap-3 flex-1 text-left">
              <i data-lucide="clock" class="w-4 h-4 text-slate-400"></i>
              <span class="text-sm text-slate-700">Sarah Mitchell</span>
            </button>
            <button class="remove-item p-1.5 hover:bg-slate-200 rounded-lg flex-shrink-0">
              <i data-lucide="x" class="w-4 h-4 text-slate-400"></i>
            </button>
          </div>
          
          <div class="flex items-center justify-between w-full p-3 rounded-lg hover:bg-slate-50 transition group">
            <button class="flex items-center gap-3 flex-1 text-left">
              <i data-lucide="clock" class="w-4 h-4 text-slate-400"></i>
              <span class="text-sm text-slate-700">cultivation</span>
            </button>
            <button class="remove-item p-1.5 hover:bg-slate-200 rounded-lg flex-shrink-0">
              <i data-lucide="x" class="w-4 h-4 text-slate-400"></i>
            </button>
          </div>
        </div>
        <div id="no-recent-message" class="hidden text-center py-8 text-slate-400 text-sm">
          No recent searches
        </div>
      </div>
      
      <!-- Trending Searches -->
      <div>
        <div class="text-sm font-semibold mb-3">Trending searches</div>
        <div class="space-y-2">
          <button class="flex items-center justify-between w-full p-3 rounded-lg hover:bg-slate-50 active:bg-slate-100 transition">
            <div class="flex items-center gap-3">
              <div class="flex items-center justify-center w-6 h-6 rounded-full bg-gradient-to-br from-red-500 to-orange-500 text-white text-xs font-bold">1</div>
              <span class="text-sm font-medium">Echoes of Dawn</span>
            </div>
            <i data-lucide="trending-up" class="w-4 h-4 text-red-500"></i>
          </button>
          
          <button class="flex items-center justify-between w-full p-3 rounded-lg hover:bg-slate-50 active:bg-slate-100 transition">
            <div class="flex items-center gap-3">
              <div class="flex items-center justify-center w-6 h-6 rounded-full bg-gradient-to-br from-orange-500 to-yellow-500 text-white text-xs font-bold">2</div>
              <span class="text-sm font-medium">reincarnation</span>
            </div>
            <i data-lucide="trending-up" class="w-4 h-4 text-orange-500"></i>
          </button>
          
          <button class="flex items-center justify-between w-full p-3 rounded-lg hover:bg-slate-50 active:bg-slate-100 transition">
            <div class="flex items-center gap-3">
              <div class="flex items-center justify-center w-6 h-6 rounded-full bg-gradient-to-br from-yellow-500 to-green-500 text-white text-xs font-bold">3</div>
              <span class="text-sm font-medium">system novel</span>
            </div>
            <i data-lucide="trending-up" class="w-4 h-4 text-yellow-600"></i>
          </button>
          
          <button class="flex items-center justify-between w-full p-3 rounded-lg hover:bg-slate-50 active:bg-slate-100 transition">
            <div class="flex items-center gap-3">
              <div class="flex items-center justify-center w-6 h-6 rounded-full bg-slate-200 text-slate-700 text-xs font-bold">4</div>
              <span class="text-sm">Emma Rodriguez</span>
            </div>
            <i data-lucide="trending-up" class="w-4 h-4 text-green-500"></i>
          </button>
          
          <button class="flex items-center justify-between w-full p-3 rounded-lg hover:bg-slate-50 active:bg-slate-100 transition">
            <div class="flex items-center gap-3">
              <div class="flex items-center justify-center w-6 h-6 rounded-full bg-slate-200 text-slate-700 text-xs font-bold">5</div>
              <span class="text-sm">urban fantasy</span>
            </div>
            <i data-lucide="trending-up" class="w-4 h-4 text-green-500"></i>
          </button>
          
          <button class="flex items-center justify-between w-full p-3 rounded-lg hover:bg-slate-50 active:bg-slate-100 transition">
            <div class="flex items-center gap-3">
              <div class="flex items-center justify-center w-6 h-6 rounded-full bg-slate-200 text-slate-700 text-xs font-bold">6</div>
              <span class="text-sm">martial arts</span>
            </div>
            <i data-lucide="trending-up" class="w-4 h-4 text-slate-400"></i>
          </button>
          
          <button class="flex items-center justify-between w-full p-3 rounded-lg hover:bg-slate-50 active:bg-slate-100 transition">
            <div class="flex items-center gap-3">
              <div class="flex items-center justify-center w-6 h-6 rounded-full bg-slate-200 text-slate-700 text-xs font-bold">7</div>
              <span class="text-sm">The Last Chronicle</span>
            </div>
            <i data-lucide="trending-up" class="w-4 h-4 text-slate-400"></i>
          </button>
        </div>
      </div>
      
      <!-- Popular Tags -->
      <div>
        <div class="text-sm font-semibold mb-3">Popular tags</div>
        <div class="flex flex-wrap gap-2">
          <button class="px-3 py-1.5 rounded-full bg-sky-50 text-sky-700 text-xs font-semibold border border-sky-200 hover:bg-sky-100">Romance</button>
          <button class="px-3 py-1.5 rounded-full bg-purple-50 text-purple-700 text-xs font-semibold border border-purple-200 hover:bg-purple-100">Fantasy</button>
          <button class="px-3 py-1.5 rounded-full bg-pink-50 text-pink-700 text-xs font-semibold border border-pink-200 hover:bg-pink-100">Cultivation</button>
          <button class="px-3 py-1.5 rounded-full bg-green-50 text-green-700 text-xs font-semibold border border-green-200 hover:bg-green-100">System</button>
          <button class="px-3 py-1.5 rounded-full bg-orange-50 text-orange-700 text-xs font-semibold border border-orange-200 hover:bg-orange-100">Reincarnation</button>
          <button class="px-3 py-1.5 rounded-full bg-blue-50 text-blue-700 text-xs font-semibold border border-blue-200 hover:bg-blue-100">Sci-Fi</button>
          <button class="px-3 py-1.5 rounded-full bg-red-50 text-red-700 text-xs font-semibold border border-red-200 hover:bg-red-100">Action</button>
          <button class="px-3 py-1.5 rounded-full bg-indigo-50 text-indigo-700 text-xs font-semibold border border-indigo-200 hover:bg-indigo-100">Mystery</button>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    lucide.createIcons();
    
    // Clear all recent searches
    document.getElementById('clear-all-btn').addEventListener('click', function() {
      const list = document.getElementById('recent-searches-list');
      const noMessage = document.getElementById('no-recent-message');
      
      // Clear all items
      list.innerHTML = '';
      list.classList.add('hidden');
      noMessage.classList.remove('hidden');
    });
    
    // Remove individual recent search items
    document.querySelectorAll('.remove-item').forEach(btn => {
      btn.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        
        const item = this.closest('.flex.items-center.justify-between');
        item.style.transition = 'opacity 0.2s';
        item.style.opacity = '0';
        
        setTimeout(() => {
          item.remove();
          
          // Check if list is empty
          const list = document.getElementById('recent-searches-list');
          if (list.children.length === 0) {
            list.classList.add('hidden');
            document.getElementById('no-recent-message').classList.remove('hidden');
          }
        }, 200);
      });
    });
  </script>
</body>
</html>
