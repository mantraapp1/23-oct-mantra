<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WebNovel - Password Reset</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="font-inter antialiased bg-white text-slate-800">
  <div class="min-h-screen flex flex-col max-w-md mx-auto bg-white">
    <section class="min-h-screen">
      <div class="px-5 pt-14 pb-6">
        <div class="mb-6">
          <div class="h-10 w-10 rounded-xl bg-sky-500 text-white flex items-center justify-center font-semibold text-[10px]">Mantra</div>
          <h1 class="mt-4 text-2xl font-semibold tracking-tight text-slate-900">Reset password</h1>
          <p class="text-slate-500 text-sm mt-1">We'll send a reset link to your email</p>
        </div>
        <div class="space-y-4">
          <div>
            <label class="block text-xs text-slate-500 mb-1">Email</label>
            <input type="email" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-sky-500 bg-white" placeholder="you@example.com">
          </div>
          <button class="w-full rounded-xl bg-sky-500 text-white text-sm font-semibold py-2.5 active:scale-95 shadow-sm">Send Link</button>
        </div>
      </div>
    </section>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
