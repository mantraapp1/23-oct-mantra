<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WebNovel - Onboarding</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  .genre-btn {
    transition: all 0.2s ease;
  }
  .genre-btn.selected {
    background-color: #0ea5e9;
    color: white;
    border-color: #0ea5e9;
  }
  .error-text {
    color: #ef4444;
    font-size: 0.75rem;
    margin-top: 0.25rem;
  }
  .success-text {
    color: #10b981;
    font-size: 0.75rem;
    margin-top: 0.25rem;
  }
  .image-placeholder {
    background-color: #f1f5f9;
    border: 2px dashed #cbd5e1;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    cursor: pointer;
  }
  .image-placeholder:hover {
    border-color: #0ea5e9;
    background-color: #f0f9ff;
  }
</style>
</head>
<body class="font-inter antialiased bg-white text-slate-800">
  <div class="min-h-screen flex flex-col max-w-md mx-auto bg-white">
    <section class="min-h-screen">
      <div class="px-5 pt-14 pb-24">
        <div class="mb-6">
          <h1 class="text-2xl font-semibold tracking-tight text-slate-900">Set up your profile</h1>
          <p class="text-slate-500 text-sm mt-1">Tell us a bit about you</p>
        </div>
        <form id="onboarding-form" class="space-y-5" novalidate>
          <div class="flex items-center gap-4">
            <div class="relative">
              <div id="image-placeholder" class="image-placeholder h-16 w-16 rounded-full" onclick="document.getElementById('photo-upload').click()">
                <i data-lucide="image" class="w-6 h-6 text-slate-400"></i>
                <span class="text-xs text-slate-400 mt-1">Upload</span>
              </div>
              <img id="profile-image" src="" alt="" class="h-16 w-16 rounded-full object-cover border border-slate-200 hidden">
              <input type="file" id="photo-upload" accept="image/*" class="hidden" onchange="handlePhotoUpload(event)">
              <button type="button" onclick="document.getElementById('photo-upload').click()" class="absolute -bottom-1 -right-1 h-7 w-7 rounded-full bg-sky-500 text-white flex items-center justify-center shadow">
                <i data-lucide="camera" class="w-4 h-4"></i>
              </button>
            </div>
            <div class="flex-1 grid grid-cols-2 gap-3">
              <div>
                <label class="block text-xs text-slate-500 mb-1">Name <span class="text-slate-400">*</span></label>
                <input id="name-input" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-sky-500 bg-white" placeholder="Your name">
                <div id="name-error" class="error-text hidden"></div>
              </div>
              <div>
                <label class="block text-xs text-slate-500 mb-1">Username <span class="text-slate-400">*</span></label>
                <input id="username-input" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-sky-500 bg-white" placeholder="@username">
                <div id="username-error" class="error-text hidden"></div>
                <div id="username-success" class="success-text hidden"></div>
              </div>
            </div>
          </div>
          <div class="grid grid-cols-3 gap-3">
            <div>
              <label class="block text-xs text-slate-500 mb-1">Gender <span class="text-slate-400">*</span></label>
              <select id="gender-input" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-sky-500 bg-white">
                <option value="">Select</option>
                <option>Male</option>
                <option>Female</option>
                <option>Non-binary</option>
                <option>Prefer not to say</option>
              </select>
              <div id="gender-error" class="error-text hidden"></div>
            </div>
            <div>
              <label class="block text-xs text-slate-500 mb-1">Age <span class="text-slate-400">*</span></label>
              <input id="age-input" type="number" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-sky-500 bg-white" placeholder="18">
              <div id="age-error" class="error-text hidden"></div>
            </div>
            <div>
              <label class="block text-xs text-slate-500 mb-1">Language <span class="text-slate-400">*</span></label>
              <select id="language-input" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-sky-500 bg-white">
                <option value="">Select</option>
                <option>English</option>
                <option>Spanish</option>
                <option>French</option>
                <option>Hindi</option>
                <option>Chinese</option>
              </select>
              <div id="language-error" class="error-text hidden"></div>
            </div>
          </div>
          <div>
            <div class="flex items-center justify-between mb-2">
              <h2 class="text-base font-semibold tracking-tight text-slate-900">Favorite genres</h2>
              <div class="text-xs text-slate-500">Pick up to <span id="genre-count">0</span>/3</div>
            </div>
            <div id="genre-container" class="flex flex-wrap gap-2">
              <button type="button" class="genre-btn px-3 py-1.5 rounded-full border border-slate-200 text-xs" onclick="toggleGenre(this)">Fantasy</button>
              <button type="button" class="genre-btn px-3 py-1.5 rounded-full border border-slate-200 text-xs" onclick="toggleGenre(this)">Sci-Fi</button>
              <button type="button" class="genre-btn px-3 py-1.5 rounded-full border border-slate-200 text-xs" onclick="toggleGenre(this)">Romance</button>
              <button type="button" class="genre-btn px-3 py-1.5 rounded-full border border-slate-200 text-xs" onclick="toggleGenre(this)">Thriller</button>
              <button type="button" class="genre-btn px-3 py-1.5 rounded-full border border-slate-200 text-xs" onclick="toggleGenre(this)">Mystery</button>
              <button type="button" class="genre-btn px-3 py-1.5 rounded-full border border-slate-200 text-xs" onclick="toggleGenre(this)">Horror</button>
              <button type="button" class="genre-btn px-3 py-1.5 rounded-full border border-slate-200 text-xs" onclick="toggleGenre(this)">Adventure</button>
              <button type="button" class="genre-btn px-3 py-1.5 rounded-full border border-slate-200 text-xs" onclick="toggleGenre(this)">Slice of Life</button>
            </div>
            <div id="genre-error" class="error-text hidden"></div>
          </div>
          <div id="form-error" class="error-text hidden text-center"></div>
          <button type="submit" class="w-full rounded-xl bg-sky-500 text-white text-sm font-semibold py-2.5 active:scale-95 shadow-sm">Continue</button>
        </form>
      </div>
    </section>
  </div>
  
  <script>
    lucide.createIcons();
    
    let selectedGenres = [];
    const maxGenres = 3;
    let usernameCheckTimeout;
    
    // Simulated database of taken usernames (in production, this would be an API call)
    const takenUsernames = ['admin', 'user', 'mantra', 'test', 'demo', 'webnovel'];
    
    // Toggle genre selection
    function toggleGenre(button) {
      const isSelected = button.classList.contains('selected');
      
      if (isSelected) {
        button.classList.remove('selected');
        const genre = button.textContent;
        selectedGenres = selectedGenres.filter(g => g !== genre);
      } else {
        if (selectedGenres.length >= maxGenres) {
          return;
        }
        button.classList.add('selected');
        selectedGenres.push(button.textContent);
      }
      
      document.getElementById('genre-count').textContent = selectedGenres.length;
      hideError('genre-error');
    }
    
    // Handle photo upload
    function handlePhotoUpload(event) {
      const file = event.target.files[0];
      if (file) {
        if (file.size > 5 * 1024 * 1024) {
          alert('File size must be less than 5MB');
          return;
        }
        
        if (!file.type.startsWith('image/')) {
          alert('Please upload an image file');
          return;
        }
        
        const reader = new FileReader();
        reader.onload = function(e) {
          document.getElementById('profile-image').src = e.target.result;
          document.getElementById('profile-image').classList.remove('hidden');
          document.getElementById('image-placeholder').classList.add('hidden');
          lucide.createIcons();
        };
        reader.readAsDataURL(file);
      }
    }
    
    // Username validation and checking
    document.getElementById('username-input').addEventListener('input', function(e) {
      const username = e.target.value.trim();
      const errorEl = document.getElementById('username-error');
      const successEl = document.getElementById('username-success');
      
      // Clear previous timeout
      clearTimeout(usernameCheckTimeout);
      
      // Hide both messages initially
      errorEl.classList.add('hidden');
      successEl.classList.add('hidden');
      
      if (!username) {
        return;
      }
      
      // Check username format
      if (username.length < 3) {
        showError('username-error', 'Username must be at least 3 characters');
        return;
      }
      
      if (!/^[a-zA-Z0-9_]+$/.test(username)) {
        showError('username-error', 'Username can only contain letters, numbers, and underscores');
        return;
      }
      
      // Simulate API call with delay
      usernameCheckTimeout = setTimeout(() => {
        checkUsernameAvailability(username);
      }, 500);
    });
    
    // Simulate username availability check (replace with actual API call)
    function checkUsernameAvailability(username) {
      const errorEl = document.getElementById('username-error');
      const successEl = document.getElementById('username-success');
      
      if (takenUsernames.includes(username.toLowerCase())) {
        showError('username-error', 'Username already taken');
        successEl.classList.add('hidden');
      } else {
        successEl.textContent = 'Username available ';
        successEl.classList.remove('hidden');
        errorEl.classList.add('hidden');
      }
    }
    
    // Form submission
    document.getElementById('onboarding-form').addEventListener('submit', function(e) {
      e.preventDefault();
      
      let isValid = true;
      
      // Clear all previous errors
      document.querySelectorAll('.error-text').forEach(el => el.classList.add('hidden'));
      document.getElementById('username-success').classList.add('hidden');
      
      // Validate name
      const name = document.getElementById('name-input').value.trim();
      if (!name) {
        showError('name-error', 'Name is required');
        isValid = false;
      }
      
      // Validate username
      const username = document.getElementById('username-input').value.trim();
      if (!username) {
        showError('username-error', 'Username is required');
        isValid = false;
      } else if (username.length < 3) {
        showError('username-error', 'Username must be at least 3 characters');
        isValid = false;
      } else if (takenUsernames.includes(username.toLowerCase())) {
        showError('username-error', 'Username already taken');
        isValid = false;
      }
      
      // Validate gender
      const gender = document.getElementById('gender-input').value;
      if (!gender) {
        showError('gender-error', 'Gender is required');
        isValid = false;
      }
      
      // Validate age
      const age = document.getElementById('age-input').value;
      if (!age) {
        showError('age-error', 'Age is required');
        isValid = false;
      } else if (age < 13) {
        showError('age-error', 'You must be at least 13 years old');
        isValid = false;
      } else if (age > 120) {
        showError('age-error', 'Please enter a valid age');
        isValid = false;
      }
      
      // Validate language
      const language = document.getElementById('language-input').value;
      if (!language) {
        showError('language-error', 'Language is required');
        isValid = false;
      }
      
      // Validate genres
      if (selectedGenres.length === 0) {
        showError('genre-error', 'Please select at least one genre');
        isValid = false;
      }
      
      // If all valid, proceed
      if (isValid) {
        console.log('Form submitted successfully!');
        console.log({
          name,
          username,
          gender,
          age,
          language,
          genres: selectedGenres
        });
        // Here you would send the data to your backend
        alert('Profile created successfully!');
      } else {
        showError('form-error', 'Please fill all required fields correctly');
      }
    });
    
    // Helper functions
    function showError(elementId, message) {
      const errorEl = document.getElementById(elementId);
      errorEl.textContent = message;
      errorEl.classList.remove('hidden');
    }
    
    function hideError(elementId) {
      const errorEl = document.getElementById(elementId);
      errorEl.classList.add('hidden');
    }
    
    // Add input listeners to clear errors on change
    ['name-input', 'gender-input', 'age-input', 'language-input'].forEach(id => {
      document.getElementById(id).addEventListener('input', function() {
        hideError(id.replace('-input', '-error'));
        hideError('form-error');
      });
    });
  </script>
</body>
</html>
