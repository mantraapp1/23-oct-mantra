<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mantra Splash with Blur and Dots Loading</title>
    <style>
        /* General Reset */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Main Splash Screen Container */
        #splash-screen {
            position: fixed;
            width: 100vw;
            height: 100vh;
            top: 0;
            left: 0;
            z-index: 9999;
            overflow: hidden;
            transition: opacity 0.5s ease-out;
        }

        /* Background Image & Blur Layer */
        #background-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(2px);
            z-index: 1;
        }

        #blur-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.15); /* Light translucent overlay */
            z-index: 2;
        }

        /* Splash Content Styling */
        .splash-content {
            position: relative;
            z-index: 3;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .logo {
            width: 140px;
            height: 140px;
            border-radius: 35px;
            box-shadow: 0 10px 40px rgba(0, 50, 100, 0.35);
            animation: fadeInScale 1.5s ease-out forwards;
            filter: drop-shadow(0 0 8px rgba(0,0,0,0.2));
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Popping Dots Loading Animation */
        .loading-dots {
            display: flex;
            justify-content: center;
            margin-top: 25px;
            gap: 12px;
            width: 100px;
        }

        .dot {
            width: 16px;
            height: 16px;
            background-color: #00a1ff;
            border-radius: 50%;
            opacity: 0.4;
            animation: popUp 1.2s ease-in-out infinite;
        }

        .dot:nth-child(1) {
            animation-delay: 0s;
        }
        .dot:nth-child(2) {
            animation-delay: 0.3s;
        }
        .dot:nth-child(3) {
            animation-delay: 0.6s;
        }

        @keyframes popUp {
            0%, 100% {
                opacity: 0.4;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.5);
            }
        }

        /* Main content hidden initially for demo */
        #main-content {
            padding: 20px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div id="splash-screen">
        <img src="assets/Splash background.jpg" alt="Background" id="background-image" />
        <div id="blur-overlay"></div>

        <div class="splash-content">
            <img src="assets/Mantra logo.jpeg" alt="Mantra Logo" class="logo" />
            <div class="loading-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>
    </div>

    <div id="main-content">
        <h1>Welcome to Mantra</h1>
    </div>

    <script>
        window.addEventListener('load', () => {
            const splash = document.getElementById('splash-screen');
            const mainContent = document.getElementById('main-content');
            setTimeout(() => {
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                    mainContent.style.display = 'block';
                }, 500); // This must match CSS transition duration
            }, 3500); // Total time splash screen is visible
        });
    </script>
</body>
</html>
