<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No Notifications</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #ffffff;
        }

        .no-notifications {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 40px;
            text-align: center;
            min-height: 100vh;
        }

        .no-notifications-icon {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 72px;
            height: 72px;
            margin-bottom: 24px;
            background-color: #f1f5f9;
            border-radius: 14px;
        }

        .no-notifications-icon svg {
            width: 36px;
            height: 36px;
        }

        .no-notifications-title {
            font-size: 22px;
            font-weight: 600;
            color: #1e293b;
            margin: 0 0 10px 0;
            line-height: 1.3;
        }

        .no-notifications-subtitle {
            font-size: 15px;
            color: #64748b;
            margin: 0;
            line-height: 1.5;
        }

        @media (max-width: 480px) {
            .no-notifications {
                padding: 60px 24px;
            }

            .no-notifications-title {
                font-size: 20px;
            }

            .no-notifications-subtitle {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="no-notifications">
        <div class="no-notifications-icon">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
        </div>
        <h3 class="no-notifications-title">No notifications yet</h3>
        <p class="no-notifications-subtitle">You'll see updates and alerts here when they arrive.</p>
    </div>
</body>
</html>
