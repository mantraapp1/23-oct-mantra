<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WebNovel - Notifications</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="font-inter antialiased bg-white text-slate-800">
  <div class="min-h-screen flex flex-col max-w-md mx-auto bg-white">
    <div class="sticky top-0 bg-white z-40 border-b border-slate-100">
      <div class="px-4 py-3 flex items-center gap-2">
        <button class="p-2 rounded-lg hover:bg-slate-100 active:scale-95"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
        <div class="text-base font-semibold">Notifications</div>
        <button class="ml-auto text-xs text-sky-600 font-semibold">Mark all read</button>
      </div>
    </div>
    <div class="px-4 pt-4 pb-24 space-y-3">
      <div class="flex gap-3 p-3 rounded-xl border border-slate-100 bg-sky-50/30">
        <div class="h-9 w-9 rounded-full bg-sky-100 flex items-center justify-center flex-shrink-0">
          <i data-lucide="bell" class="w-4 h-4 text-sky-600"></i>
        </div>
        <div class="flex-1">
          <div class="text-sm font-semibold">New chapter released</div>
          <div class="text-xs text-slate-500 mt-0.5">Crimson Ledger - Chapter 149 is now available</div>
          <div class="text-[10px] text-slate-400 mt-1">2 minutes ago</div>
        </div>
      </div>
      <div class="flex gap-3 p-3 rounded-xl border border-slate-100">
        <div class="h-9 w-9 rounded-full bg-amber-100 flex items-center justify-center flex-shrink-0">
          <i data-lucide="user-plus" class="w-4 h-4 text-amber-600"></i>
        </div>
        <div class="flex-1">
          <div class="text-sm font-semibold">New follower</div>
          <div class="text-xs text-slate-500 mt-0.5">Alex started following you</div>
          <div class="text-[10px] text-slate-400 mt-1">3 hours ago</div>
        </div>
      </div>
      <div class="flex gap-3 p-3 rounded-xl border border-slate-100">
        <div class="h-9 w-9 rounded-full bg-indigo-100 flex items-center justify-center flex-shrink-0">
          <i data-lucide="message-circle" class="w-4 h-4 text-indigo-600"></i>
        </div>
        <div class="flex-1">
          <div class="text-sm font-semibold">New comment</div>
          <div class="text-xs text-slate-500 mt-0.5">Someone commented on Chapter 148</div>
          <div class="text-[10px] text-slate-400 mt-1">5 hours ago</div>
        </div>
      </div>
    </div>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
