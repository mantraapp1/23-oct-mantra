<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WebNovel - Email Verification</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="font-inter antialiased bg-white text-slate-800">
  <div class="min-h-screen flex flex-col max-w-md mx-auto bg-white">
    <section class="min-h-screen">
      <div class="px-5 pt-14 pb-6">
        <div class="mb-6">
          <div class="h-10 w-10 rounded-xl bg-sky-500 text-white flex items-center justify-center font-semibold text-[10px]">Mantra</div>
          <h1 class="mt-4 text-2xl font-semibold tracking-tight text-slate-900">Verify your email</h1>
          <p class="text-slate-500 text-sm mt-1">Enter the 6-digit code sent to your email</p>
        </div>
        <div class="flex gap-2 justify-between mb-4">
          <input maxlength="1" class="otp-input w-12 h-14 text-center rounded-xl border border-slate-200 text-lg font-semibold focus:ring-2 focus:ring-sky-500 outline-none">
          <input maxlength="1" class="otp-input w-12 h-14 text-center rounded-xl border border-slate-200 text-lg font-semibold focus:ring-2 focus:ring-sky-500 outline-none">
          <input maxlength="1" class="otp-input w-12 h-14 text-center rounded-xl border border-slate-200 text-lg font-semibold focus:ring-2 focus:ring-sky-500 outline-none">
          <input maxlength="1" class="otp-input w-12 h-14 text-center rounded-xl border border-slate-200 text-lg font-semibold focus:ring-2 focus:ring-sky-500 outline-none">
          <input maxlength="1" class="otp-input w-12 h-14 text-center rounded-xl border border-slate-200 text-lg font-semibold focus:ring-2 focus:ring-sky-500 outline-none">
          <input maxlength="1" class="otp-input w-12 h-14 text-center rounded-xl border border-slate-200 text-lg font-semibold focus:ring-2 focus:ring-sky-500 outline-none">
        </div>
        <button class="w-full rounded-xl bg-sky-500 text-white text-sm font-semibold py-2.5 active:scale-95 shadow-sm">Verify</button>
        <div class="text-center text-xs text-slate-500 mt-3">Didn't receive? <button class="text-sky-600 hover:text-sky-700 font-semibold">Resend</button></div>
      </div>
    </section>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
