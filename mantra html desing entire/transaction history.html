<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WebNovel - Transaction History</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="font-inter antialiased bg-white text-slate-800">
  <div class="min-h-screen flex flex-col max-w-md mx-auto bg-white">
    <!-- Header -->
    <div class="sticky top-0 bg-white z-40 border-b border-slate-100">
      <div class="px-4 py-3 flex items-center gap-2">
        <button class="p-2 rounded-lg hover:bg-slate-100 active:scale-95"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
        <div class="text-base font-semibold">Transaction History</div>
      </div>
    </div>

    <!-- Summary Card -->
    <div class="px-4 pt-4 pb-2">
      <div class="rounded-2xl bg-gradient-to-br from-sky-500 to-indigo-600 p-5 text-white shadow-lg">
        <div class="text-xs opacity-90">Total Transactions</div>
        <div class="text-2xl font-semibold tracking-tight mt-1" id="totalTransactions">50</div>
        <div class="text-xs opacity-80 mt-2">Last updated: Oct 21, 2025</div>
      </div>
    </div>

    <!-- Transactions List -->
    <div class="px-4 pt-4 pb-24">
      <div class="text-sm font-semibold mb-3">All Transactions</div>
      <div class="space-y-2" id="transactionsList">
        <!-- Transactions will be inserted here by JavaScript -->
      </div>
    </div>
  </div>

  <script>
    // Transaction Component Builder
    class TransactionComponent {
      constructor(data) {
        this.type = data.type;
        this.novelName = data.novelName;
        this.amount = data.amount;
        this.status = data.status;
        this.date = data.date;
      }

      getStatusConfig() {
        const configs = {
          'Successful': {
            bgColor: 'border-slate-100',
            iconBg: 'bg-emerald-50',
            iconColor: 'text-emerald-600',
            textColor: 'text-emerald-600',
            statusIcon: 'check-circle'
          },
          'Pending': {
            bgColor: 'border-amber-100 bg-amber-50/30',
            iconBg: 'bg-amber-100',
            iconColor: 'text-amber-600',
            textColor: 'text-amber-600',
            statusIcon: 'clock'
          },
          'Failed': {
            bgColor: 'border-rose-100 bg-rose-50/30',
            iconBg: 'bg-rose-100',
            iconColor: 'text-rose-600',
            textColor: 'text-rose-600',
            statusIcon: 'x-circle'
          }
        };
        return configs[this.status];
      }

      render() {
        const config = this.getStatusConfig();
        const sign = this.status === 'Failed' ? '-' : '+';
        
        return `
          <div class="flex items-center gap-3 p-3 rounded-xl border ${config.bgColor}">
            <div class="h-9 w-9 rounded-lg ${config.iconBg} flex items-center justify-center flex-shrink-0">
              <i data-lucide="trending-up" class="w-4 h-4 ${config.iconColor}"></i>
            </div>
            <div class="flex-1 min-w-0">
              <div class="text-sm font-semibold">${this.type}</div>
              <div class="text-[11px] text-slate-500 truncate">${this.novelName}</div>
              <div class="flex items-center gap-1 mt-0.5">
                <i data-lucide="${config.statusIcon}" class="w-3 h-3 ${config.textColor}"></i>
                <span class="text-[10px] ${config.textColor} font-semibold">${this.status}</span>
                <span class="text-[10px] text-slate-400 ml-1">${this.date}</span>
              </div>
            </div>
            <div class="text-sm font-semibold ${config.textColor} flex-shrink-0">${sign}${this.amount.toFixed(2)} XLM</div>
          </div>
        `;
      }
    }

    // Generate dummy transaction data
    function generateTransactions() {
      const novelNames = [
        'Crimson Ledger', 'Night Vault', 'Moonlit Path', 'Shadow King', 
        'Silver Dawn', 'Ancient Warrior', 'Lost Kingdom', "Dragon's Tale",
        'Eternal Empire', 'Storm Rider', 'Phoenix Rising', 'Dark Prophecy'
      ];
      
      const statuses = ['Successful', 'Successful', 'Successful', 'Successful', 'Pending', 'Failed'];
      
      const transactions = [];
      const now = new Date();
      
      for (let i = 0; i < 50; i++) {
        const daysAgo = Math.floor(i / 5);
        const hoursAgo = Math.floor(Math.random() * 24);
        const minutesAgo = Math.floor(Math.random() * 60);
        
        const transDate = new Date(now);
        transDate.setDate(transDate.getDate() - daysAgo);
        transDate.setHours(transDate.getHours() - hoursAgo);
        transDate.setMinutes(transDate.getMinutes() - minutesAgo);
        
        const options = { 
          year: 'numeric', 
          month: 'short', 
          day: 'numeric',
          hour: 'numeric',
          minute: '2-digit',
          hour12: true
        };
        
        transactions.push({
          type: 'Novel Earnings',
          novelName: novelNames[Math.floor(Math.random() * novelNames.length)],
          amount: parseFloat((Math.random() * 450 + 50).toFixed(2)),
          status: statuses[Math.floor(Math.random() * statuses.length)],
          date: transDate.toLocaleString('en-US', options)
        });
      }
      
      return transactions;
    }

    // Render all transactions
    function renderTransactions() {
      const transactions = generateTransactions();
      const container = document.getElementById('transactionsList');
      
      const html = transactions.map(data => {
        const transaction = new TransactionComponent(data);
        return transaction.render();
      }).join('');
      
      container.innerHTML = html;
      
      // Update total count
      document.getElementById('totalTransactions').textContent = transactions.length;
      
      // Initialize Lucide icons after rendering
      lucide.createIcons();
    }

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', renderTransactions);
  </script>
</body>
</html>
