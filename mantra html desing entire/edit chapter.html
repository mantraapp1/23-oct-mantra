<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Edit Chapter - Mantra</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; }
    .error-message { color: #ef4444; font-size: 12px; margin-top: 4px; display: none; }
    .word-count { font-size: 12px; color: #64748b; text-align: right; margin-top: 4px; }
    .success-message {
      position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
      background: #10b981; color: white; padding: 12px 24px;
      border-radius: 8px; font-size: 14px; z-index: 1000; display: none;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body class="bg-white">
  <div id="successMessage" class="success-message"></div>

  <div class="min-h-screen max-w-md mx-auto bg-white">
    <header class="sticky top-0 z-50 bg-white border-b border-slate-100">
      <div class="flex items-center justify-between px-4 py-3">
        <button type="button" onclick="goBack()" class="p-2 -ml-2 rounded-lg hover:bg-slate-100 active:scale-95 transition">
          <i data-lucide="arrow-left" class="w-5 h-5 text-slate-700"></i>
        </button>
        <h1 class="text-base font-semibold text-slate-900">Edit Chapter</h1>
        <button type="button" onclick="deleteChapter()" class="p-2 -mr-2 rounded-lg hover:bg-red-50 active:scale-95 transition">
          <i data-lucide="trash-2" class="w-5 h-5 text-red-600"></i>
        </button>
      </div>
    </header>

    <main class="px-4 py-5 pb-20">
      <div class="mb-6 p-3 bg-slate-50 rounded-lg border border-slate-200">
        <p class="text-xs text-slate-500 mb-1">Editing chapter from:</p>
        <p class="text-sm font-semibold text-slate-900" id="novelTitle">My Novel</p>
      </div>

      <div class="mb-6">
        <label class="block text-xs font-medium text-slate-500 mb-2.5">Chapter Number *</label>
        <input type="number" id="chapterNumber" min="1" value="1" class="w-full px-3 py-2.5 border border-slate-200 rounded-lg text-sm text-slate-900 outline-none focus:ring-2 focus:ring-sky-500 focus:border-transparent transition" placeholder="1">
        <p class="error-message" id="numberError">Chapter number is required</p>
      </div>

      <div class="mb-6">
        <label class="block text-xs font-medium text-slate-500 mb-2.5">Chapter Title *</label>
        <input type="text" id="chapterTitle" class="w-full px-3 py-2.5 border border-slate-200 rounded-lg text-sm text-slate-900 outline-none focus:ring-2 focus:ring-sky-500 focus:border-transparent transition" placeholder="Enter chapter title">
        <p class="text-xs text-slate-400 mt-1.5">Example: "The Beginning" or "First Encounter"</p>
        <p class="error-message" id="titleError">Chapter title is required</p>
      </div>

      <div class="mb-6">
        <label class="block text-xs font-medium text-slate-500 mb-2.5">Chapter Content *</label>
        <textarea id="contentInput" rows="15" class="w-full px-3 py-2.5 border border-slate-200 rounded-lg text-sm text-slate-700 leading-relaxed outline-none focus:ring-2 focus:ring-sky-500 focus:border-transparent transition resize-none" placeholder="Start writing your chapter here..."></textarea>
        <div class="word-count">
          <span id="wordCount">0</span> words • <span id="charCount">0</span> characters
        </div>
        <p class="error-message" id="contentError">Chapter content is required (minimum 100 words)</p>
      </div>

      <div class="flex flex-col gap-3 mt-8">
        <button type="button" onclick="updateChapter()" class="w-full px-5 py-3 bg-sky-500 text-white text-sm font-semibold rounded-lg active:scale-95 transition shadow-sm">Update Chapter</button>
        <button type="button" onclick="goBack()" class="w-full px-5 py-3 bg-slate-100 text-slate-700 text-sm font-semibold rounded-lg active:scale-95 transition">Cancel</button>
      </div>

      <div class="mt-6 p-4 bg-sky-50 rounded-lg border border-sky-100">
        <div class="flex items-start gap-2">
          <i data-lucide="info" class="w-4 h-4 text-sky-600 mt-0.5"></i>
          <div>
            <p class="text-sm font-medium text-sky-900">Last Updated</p>
            <p class="text-xs text-sky-700 mt-0.5" id="lastUpdated">Never</p>
          </div>
        </div>
      </div>
    </main>
  </div>

<script>
    let novelId = null;
    let chapterId = null;
    let originalChapter = null;

    /**
     * A highly robust word counting function with detailed logging
     * to debug environmental issues.
     */
    function countWordsWithDebug(text) {
        console.log("--- Word Count Debug ---");
        console.log("1. Raw Text Input:", `"${text}"`);

        if (!text || text.trim() === '') {
            console.log("2. Result: Text is empty, returning 0.");
            return 0;
        }

        // The most reliable method: split by any whitespace character.
        const wordsArray = text.trim().split(/\s+/);
        console.log("2. Text split into array:", wordsArray);

        const filteredWords = wordsArray.filter(word => word.length > 0);
        console.log("3. Array after filtering empty strings:", filteredWords);

        const finalCount = filteredWords.length;
        console.log("4. Final Word Count:", finalCount);
        console.log("------------------------");
        
        return finalCount;
    }

    document.addEventListener('DOMContentLoaded', () => {
        console.log('DOM fully loaded.');
        
        try {
            lucide.createIcons();
        } catch (e) {
            console.error("Lucide icons failed:", e);
        }

        const contentInput = document.getElementById('contentInput');
        const wordCountEl = document.getElementById('wordCount');
        const charCountEl = document.getElementById('charCount');
        
        if (!contentInput || !wordCountEl || !charCountEl) {
            console.error("A required element is missing!");
            return;
        }

        const updateCount = () => {
            const value = contentInput.value || '';
            charCountEl.textContent = value.length;
            wordCountEl.textContent = countWordsWithDebug(value);
        };

        contentInput.addEventListener('input', updateCount);
        contentInput.addEventListener('paste', () => setTimeout(updateCount, 0));

        const urlParams = new URLSearchParams(window.location.search);
        novelId = urlParams.get('novelId');
        chapterId = urlParams.get('chapterId');

        if (!novelId || !chapterId) {
            showError('Invalid URL.');
            setTimeout(() => window.history.back(), 2000);
            return;
        }
        
        loadData();

        function loadData() {
            try {
                const novels = JSON.parse(localStorage.getItem('novels') || '[]');
                const novel = novels.find(n => n.id == novelId);
                if (!novel) { showError('Novel not found.'); return; }
                
                document.getElementById('novelTitle').textContent = novel.title;
                const chapter = novel.chapters ? novel.chapters.find(ch => ch.id == chapterId) : null;
                if (!chapter) { showError('Chapter not found.'); return; }

                originalChapter = { ...chapter };
                document.getElementById('chapterNumber').value = chapter.chapterNumber || 1;
                document.getElementById('chapterTitle').value = chapter.title || '';
                contentInput.value = chapter.content || '';

                const lastUpdatedDate = chapter.updatedAt || chapter.createdAt;
                if (lastUpdatedDate) {
                    document.getElementById('lastUpdated').textContent = new Date(lastUpdatedDate).toLocaleString();
                }

                updateCount();

            } catch (e) {
                console.error('Failed to load data:', e);
                showError('Error loading chapter data.');
            }
        }
    });

    // All other functions (validateChapter, updateChapter, etc.) remain the same...

    function validateChapter() {
        let isValid = true;
        document.querySelectorAll('.error-message').forEach(err => err.style.display = 'none');
        if (!document.getElementById('chapterNumber').value || document.getElementById('chapterNumber').value < 1) {
            document.getElementById('numberError').style.display = 'block'; isValid = false;
        }
        if (!document.getElementById('chapterTitle').value.trim()) {
            document.getElementById('titleError').style.display = 'block'; isValid = false;
        }
        const wordCount = countWordsWithDebug(document.getElementById('contentInput').value);
        if (wordCount < 100) {
            document.getElementById('contentError').style.display = 'block'; isValid = false;
        }
        return isValid;
    }

    function updateChapter() {
        if (!validateChapter()) {
            document.querySelector('.error-message[style*="block"]')?.scrollIntoView({ behavior: 'smooth', block: 'center' });
            return;
        }
        try {
            const novels = JSON.parse(localStorage.getItem('novels') || '[]');
            const novelIndex = novels.findIndex(n => n.id == novelId);
            if (novelIndex === -1) { showError('Novel not found'); return; }
            const chapterIndex = novels[novelIndex].chapters.findIndex(ch => ch.id == chapterId);
            if (chapterIndex === -1) { showError('Chapter not found'); return; }
            const content = document.getElementById('contentInput').value;
            const wordCount = countWordsWithDebug(content);
            novels[novelIndex].chapters[chapterIndex] = {
                ...novels[novelIndex].chapters[chapterIndex],
                chapterNumber: parseInt(document.getElementById('chapterNumber').value, 10),
                title: document.getElementById('chapterTitle').value.trim(),
                content: content,
                wordCount: wordCount,
                characterCount: content.length,
                updatedAt: new Date().toISOString()
            };
            localStorage.setItem('novels', JSON.stringify(novels));
            showSuccess('Chapter updated successfully!');
            setTimeout(() => window.history.back(), 1500);
        } catch (e) {
            console.error('Error updating chapter:', e);
            showError('Error updating chapter');
        }
    }

    function deleteChapter() {
        if (!confirm('Are you sure you want to delete this chapter? This action is permanent.')) return;
        try {
            let novels = JSON.parse(localStorage.getItem('novels') || '[]');
            const novelIndex = novels.findIndex(n => n.id == novelId);
            if (novelIndex > -1) {
                novels[novelIndex].chapters = novels[novelIndex].chapters.filter(ch => ch.id != chapterId);
                localStorage.setItem('novels', JSON.stringify(novels));
                showSuccess('Chapter deleted successfully!');
                setTimeout(() => window.history.back(), 1500);
            } else {
                showError('Novel not found.');
            }
        } catch (e) {
            console.error('Error deleting chapter:', e);
            showError('Error deleting chapter');
        }
    }
    
    function goBack() {
        if (!originalChapter) { window.history.back(); return; }
        const hasChanges =
            document.getElementById('chapterNumber').value != originalChapter.chapterNumber ||
            document.getElementById('chapterTitle').value != originalChapter.title ||
            document.getElementById('contentInput').value != originalChapter.content;
        if (hasChanges && !confirm('You have unsaved changes. Are you sure you want to leave?')) {
            return;
        }
        window.history.back();
    }

    function showSuccess(message) {
        const msgEl = document.getElementById('successMessage');
        msgEl.textContent = `✓ ${message}`;
        msgEl.style.background = '#10b981';
        msgEl.style.display = 'block';
        setTimeout(() => msgEl.style.display = 'none', 3000);
    }

    function showError(message) {
        const msgEl = document.getElementById('successMessage');
        msgEl.textContent = message;
        msgEl.style.background = '#ef4444';
        msgEl.style.display = 'block';
        setTimeout(() => msgEl.style.display = 'none', 3000);
    }
</script>
</body>
</html>
