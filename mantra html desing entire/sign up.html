<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WebNovel - Sign Up</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  .error-text {
    color: #ef4444;
    font-size: 0.75rem;
    margin-top: 0.25rem;
  }
  .success-text {
    color: #10b981;
    font-size: 0.75rem;
    margin-top: 0.25rem;
  }
</style>
</head>
<body class="font-inter antialiased bg-white text-slate-800">
  <div class="min-h-screen flex flex-col max-w-md mx-auto bg-white">
    <section class="min-h-screen">
      <div class="px-5 pt-14 pb-6">
        <div class="mb-6">
          <img src="assets/Mantra logo.jpeg" alt="Mantra" class="h-12 w-auto mb-4 rounded-lg">
          <h1 class="text-2xl font-semibold tracking-tight text-slate-900">Create account</h1>
          <p class="text-slate-500 text-sm mt-1">Join and start reading</p>
        </div>
        <form id="signup-form" class="space-y-4" novalidate>
          <div>
            <label class="block text-xs text-slate-500 mb-1">Username</label>
            <input id="username-input" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-sky-500 bg-white" placeholder="username">
            <div id="username-error" class="error-text hidden"></div>
            <div id="username-success" class="success-text hidden"></div>
          </div>
          <div>
            <label class="block text-xs text-slate-500 mb-1">Email</label>
            <input id="email-input" type="email" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-sky-500 bg-white" placeholder="you@example.com">
            <div id="email-error" class="error-text hidden"></div>
          </div>
          <div>
            <label class="block text-xs text-slate-500 mb-1">Password</label>
            <input id="password-input" type="password" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-sky-500 bg-white" placeholder="••••••••">
            <div id="password-error" class="error-text hidden"></div>
          </div>
          <div id="form-error" class="error-text hidden text-center"></div>
          <button type="submit" class="w-full rounded-xl bg-sky-500 text-white text-sm font-semibold py-2.5 active:scale-95 shadow-sm">Sign Up</button>
          <div class="text-center text-xs text-slate-500">Already have an account? <button type="button" class="text-sky-600 hover:text-sky-700 font-semibold">Login</button></div>
        </form>
      </div>
    </section>
  </div>
  
  <script>
    lucide.createIcons();
    
    let usernameCheckTimeout;
    
    // Simulated database of taken usernames and emails (in production, this would be an API call)
    const takenUsernames = ['admin', 'user', 'mantra', 'test', 'demo', 'webnovel'];
    const takenEmails = ['test@example.com', 'user@mantra.com'];
    
    // Username validation and checking
    document.getElementById('username-input').addEventListener('input', function(e) {
      const username = e.target.value.trim();
      const errorEl = document.getElementById('username-error');
      const successEl = document.getElementById('username-success');
      
      // Clear previous timeout
      clearTimeout(usernameCheckTimeout);
      
      // Hide both messages initially
      errorEl.classList.add('hidden');
      successEl.classList.add('hidden');
      
      if (!username) {
        return;
      }
      
      // Check username format
      if (username.length < 3) {
        showError('username-error', 'Username must be at least 3 characters');
        return;
      }
      
      if (!/^[a-zA-Z0-9_]+$/.test(username)) {
        showError('username-error', 'Username can only contain letters, numbers, and underscores');
        return;
      }
      
      // Simulate API call with delay
      usernameCheckTimeout = setTimeout(() => {
        checkUsernameAvailability(username);
      }, 500);
    });
    
    // Simulate username availability check (replace with actual API call)
    function checkUsernameAvailability(username) {
      const errorEl = document.getElementById('username-error');
      const successEl = document.getElementById('username-success');
      
      if (takenUsernames.includes(username.toLowerCase())) {
        showError('username-error', 'Username already taken');
        successEl.classList.add('hidden');
      } else {
        successEl.textContent = 'Username available ✓';
        successEl.classList.remove('hidden');
        errorEl.classList.add('hidden');
      }
    }
    
    // Form submission
    document.getElementById('signup-form').addEventListener('submit', function(e) {
      e.preventDefault();
      
      let isValid = true;
      
      // Clear all previous errors
      document.querySelectorAll('.error-text').forEach(el => el.classList.add('hidden'));
      document.getElementById('username-success').classList.add('hidden');
      
      // Validate username
      const username = document.getElementById('username-input').value.trim();
      if (!username) {
        showError('username-error', 'Username is required');
        isValid = false;
      } else if (username.length < 3) {
        showError('username-error', 'Username must be at least 3 characters');
        isValid = false;
      } else if (!/^[a-zA-Z0-9_]+$/.test(username)) {
        showError('username-error', 'Username can only contain letters, numbers, and underscores');
        isValid = false;
      } else if (takenUsernames.includes(username.toLowerCase())) {
        showError('username-error', 'Username already taken');
        isValid = false;
      }
      
      // Validate email
      const email = document.getElementById('email-input').value.trim();
      if (!email) {
        showError('email-error', 'Email is required');
        isValid = false;
      } else if (!isValidEmail(email)) {
        showError('email-error', 'Please enter a valid email address');
        isValid = false;
      } else if (takenEmails.includes(email.toLowerCase())) {
        showError('email-error', 'Email already registered');
        isValid = false;
      }
      
      // Validate password
      const password = document.getElementById('password-input').value;
      if (!password) {
        showError('password-error', 'Password is required');
        isValid = false;
      } else if (password.length < 6) {
        showError('password-error', 'Password must be at least 6 characters');
        isValid = false;
      } else if (!/(?=.*[a-zA-Z])(?=.*[0-9])/.test(password)) {
        showError('password-error', 'Password must contain both letters and numbers');
        isValid = false;
      }
      
      // If all valid, proceed
      if (isValid) {
        console.log('Sign up successful!');
        console.log({
          username,
          email,
          password
        });
        // Here you would send the data to your backend
        alert('Account created successfully!');
      } else {
        showError();
      }
    });
    
    // Email validation helper
    function isValidEmail(email) {
      const emailRegex = /^[^s@]+@[^s@]+.[^s@]+$/;
      return emailRegex.test(email);
    }
    
    // Helper functions
    function showError(elementId, message) {
      const errorEl = document.getElementById(elementId);
      errorEl.textContent = message;
      errorEl.classList.remove('hidden');
    }
    
    function hideError(elementId) {
      const errorEl = document.getElementById(elementId);
      errorEl.classList.add('hidden');
    }
    
    // Add input listeners to clear errors on change
    document.getElementById('username-input').addEventListener('input', function() {
      hideError('username-error');
      hideError('form-error');
    });
    
    document.getElementById('email-input').addEventListener('input', function() {
      hideError('email-error');
      hideError('form-error');
    });
    
    document.getElementById('password-input').addEventListener('input', function() {
      hideError('password-error');
      hideError('form-error');
    });
  </script>
</body>
</html>
