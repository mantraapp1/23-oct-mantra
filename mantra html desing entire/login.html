<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WebNovel - Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  .error-text {
    color: #ef4444;
    font-size: 0.75rem;
    margin-top: 0.25rem;
  }
</style>
</head>
<body class="font-inter antialiased bg-white text-slate-800">
  <div class="min-h-screen flex flex-col max-w-md mx-auto bg-white">
    <section class="min-h-screen">
      <div class="px-5 pt-14 pb-6">
        <div class="mb-6">
          <img src="assets/Mantra logo.jpeg" alt="Mantra" class="h-12 w-auto mb-4 rounded-lg">
          <h1 class="text-2xl font-semibold tracking-tight text-slate-900">Welcome back</h1>
          <p class="text-slate-500 text-sm mt-1">Sign in to continue</p>
        </div>
        <form id="login-form" class="space-y-4" novalidate>
          <div>
            <label class="block text-xs text-slate-500 mb-1">Email</label>
            <input id="email-input" type="email" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-sky-500 bg-white" placeholder="you@example.com">
            <div id="email-error" class="error-text hidden"></div>
          </div>
          <div>
            <div class="flex items-center justify-between">
              <label class="block text-xs text-slate-500 mb-1">Password</label>
              <button type="button" class="text-xs text-sky-600 hover:text-sky-700">Forgot?</button>
            </div>
            <div class="relative">
              <input id="password-input" type="password" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-sky-500 bg-white" placeholder="••••••••">
              <button type="button" onclick="togglePassword()" class="absolute right-2 top-1/2 -translate-y-1/2 p-1.5 rounded-md hover:bg-slate-100">
                <i id="eye-icon" data-lucide="eye" class="w-4 h-4"></i>
              </button>
            </div>
            <div id="password-error" class="error-text hidden"></div>
          </div>
          <div id="form-error" class="error-text hidden text-center"></div>
          <button type="submit" class="w-full rounded-xl bg-sky-500 text-white text-sm font-semibold py-2.5 active:scale-95 shadow-sm">Login</button>
          <div class="text-center text-xs text-slate-500">No account? <button type="button" class="text-sky-600 hover:text-sky-700 font-semibold">Sign Up</button></div>
        </form>
      </div>
    </section>
  </div>
  
  <script>
    lucide.createIcons();
    
    // Simulated user database (in production, this would be an API call)
    const validUsers = {
      'test@example.com': 'password123',
      'user@mantra.com': 'demo1234'
    };
    
    // Toggle password visibility
    function togglePassword() {
      const passwordInput = document.getElementById('password-input');
      const eyeIcon = document.getElementById('eye-icon');
      
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        eyeIcon.setAttribute('data-lucide', 'eye-off');
      } else {
        passwordInput.type = 'password';
        eyeIcon.setAttribute('data-lucide', 'eye');
      }
      lucide.createIcons();
    }
    
    // Form submission
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      
      let isValid = true;
      
      // Clear all previous errors
      document.querySelectorAll('.error-text').forEach(el => el.classList.add('hidden'));
      
      // Validate email
      const email = document.getElementById('email-input').value.trim();
      if (!email) {
        showError('email-error', 'Email is required');
        isValid = false;
      } else if (!isValidEmail(email)) {
        showError('email-error', 'Please enter a valid email address');
        isValid = false;
      }
      
      // Validate password
      const password = document.getElementById('password-input').value;
      if (!password) {
        showError('password-error', 'Password is required');
        isValid = false;
      } else if (password.length < 6) {
        showError('password-error', 'Password must be at least 6 characters');
        isValid = false;
      }
      
      // If all valid, check credentials
      if (isValid) {
        // Simulate login check (replace with actual API call)
        if (validUsers[email] && validUsers[email] === password) {
          console.log('Login successful!');
          alert('Login successful!');
          // Here you would redirect to the main app
        } else {
          showError('form-error', 'Invalid email or password');
        }
      } else {
        showError();
      }
    });
    
    // Email validation helper
    function isValidEmail(email) {
      const emailRegex = /^[^s@]+@[^s@]+.[^s@]+$/;
      return emailRegex.test(email);
    }
    
    // Helper functions
    function showError(elementId, message) {
      const errorEl = document.getElementById(elementId);
      errorEl.textContent = message;
      errorEl.classList.remove('hidden');
    }
    
    function hideError(elementId) {
      const errorEl = document.getElementById(elementId);
      errorEl.classList.add('hidden');
    }
    
    // Add input listeners to clear errors on change
    document.getElementById('email-input').addEventListener('input', function() {
      hideError('email-error');
      hideError('form-error');
    });
    
    document.getElementById('password-input').addEventListener('input', function() {
      hideError('password-error');
      hideError('form-error');
    });
  </script>
</body>
</html>
