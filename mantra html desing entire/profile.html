<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WebNovel - Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="font-inter antialiased bg-white text-slate-800">
  <div class="min-h-screen flex flex-col max-w-md mx-auto bg-white">
    <section class="min-h-screen pb-24">
      <div class="px-4 pt-6">
        <div class="flex items-center gap-4">
          <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?q=80&w=200&auto=format&fit=crop" alt="" class="h-14 w-14 rounded-full object-cover border border-slate-200">
          <div class="flex-1">
            <div class="text-base font-semibold">Your Name</div>
            <div class="text-xs text-slate-500">@you</div>
            <div class="text-[11px] text-slate-400">Member since 2024</div>
          </div>
          <button class="px-3 py-1.5 rounded-lg border border-slate-200 text-xs bg-white hover:bg-slate-50">Edit</button>
        </div>

        <div class="mt-4 grid grid-cols-3 gap-2">
          <button class="rounded-xl border border-slate-100 p-3 text-center hover:bg-slate-50">
            <div class="text-sm font-semibold">124</div>
            <div class="text-[11px] text-slate-500">Following</div>
          </button>
          <button class="rounded-xl border border-slate-100 p-3 text-center hover:bg-slate-50">
            <div class="text-sm font-semibold">3.2k</div>
            <div class="text-[11px] text-slate-500">Followers</div>
          </button>
          <button class="rounded-xl border border-slate-100 p-3 text-center hover:bg-slate-50">
            <div class="text-sm font-semibold">$245</div>
            <div class="text-[11px] text-slate-500">Earnings</div>
          </button>
        </div>

        <div class="mt-4 space-y-2">
          <button class="w-full flex items-center gap-3 p-3 rounded-xl border border-slate-100 hover:bg-slate-50">
            <i data-lucide="book-marked" class="w-5 h-5 text-slate-600"></i>
            <div class="flex-1 text-left">
              <div class="text-sm font-semibold">My Library</div>
              <div class="text-xs text-slate-500">38 novels</div>
            </div>
            <i data-lucide="chevron-right" class="w-5 h-5 text-slate-400"></i>
          </button>
          <button class="w-full flex items-center gap-3 p-3 rounded-xl border border-slate-100 hover:bg-slate-50">
            <i data-lucide="pen-tool" class="w-5 h-5 text-slate-600"></i>
            <div class="flex-1 text-left">
              <div class="text-sm font-semibold">Author Dashboard</div>
              <div class="text-xs text-slate-500">Manage your works</div>
            </div>
            <i data-lucide="chevron-right" class="w-5 h-5 text-slate-400"></i>
          </button>
          <button class="w-full flex items-center gap-3 p-3 rounded-xl border border-slate-100 hover:bg-slate-50">
            <i data-lucide="wallet" class="w-5 h-5 text-slate-600"></i>
            <div class="flex-1 text-left">
              <div class="text-sm font-semibold">Wallet</div>
              <div class="text-xs text-slate-500">$245.50</div>
            </div>
            <i data-lucide="chevron-right" class="w-5 h-5 text-slate-400"></i>
          </button>
          <button class="w-full flex items-center gap-3 p-3 rounded-xl border border-slate-100 hover:bg-slate-50">
            <i data-lucide="bell" class="w-5 h-5 text-slate-600"></i>
            <div class="flex-1 text-left">
              <div class="text-sm font-semibold">Notifications</div>
              <div class="text-xs text-slate-500">3 unread</div>
            </div>
            <i data-lucide="chevron-right" class="w-5 h-5 text-slate-400"></i>
          </button>
          <button class="w-full flex items-center gap-3 p-3 rounded-xl border border-slate-100 hover:bg-slate-50">
            <i data-lucide="settings" class="w-5 h-5 text-slate-600"></i>
            <div class="flex-1 text-left">
              <div class="text-sm font-semibold">Settings</div>
              <div class="text-xs text-slate-500">Preferences</div>
            </div>
            <i data-lucide="chevron-right" class="w-5 h-5 text-slate-400"></i>
          </button>
          <button class="w-full flex items-center gap-3 p-3 rounded-xl border border-slate-100 hover:bg-slate-50">
            <i data-lucide="help-circle" class="w-5 h-5 text-slate-600"></i>
            <div class="flex-1 text-left">
              <div class="text-sm font-semibold">FAQ</div>
              <div class="text-xs text-slate-500">Common questions</div>
            </div>
            <i data-lucide="chevron-right" class="w-5 h-5 text-slate-400"></i>
          </button>
          <button class="w-full flex items-center gap-3 p-3 rounded-xl border border-slate-100 hover:bg-slate-50">
            <i data-lucide="star" class="w-5 h-5 text-slate-600"></i>
            <div class="flex-1 text-left">
              <div class="text-sm font-semibold">Rate the App</div>
              <div class="text-xs text-slate-500">Share your feedback</div>
            </div>
            <i data-lucide="chevron-right" class="w-5 h-5 text-slate-400"></i>
          </button>
          <button class="w-full flex items-center gap-3 p-3 rounded-xl border border-slate-100 hover:bg-slate-50">
            <i data-lucide="mail" class="w-5 h-5 text-slate-600"></i>
            <div class="flex-1 text-left">
              <div class="text-sm font-semibold">Contact Us</div>
              <div class="text-xs text-slate-500">Get in touch</div>
            </div>
            <i data-lucide="chevron-right" class="w-5 h-5 text-slate-400"></i>
          </button>
          <button class="w-full flex items-center gap-3 p-3 rounded-xl border border-slate-100 hover:bg-slate-50">
            <i data-lucide="flag" class="w-5 h-5 text-slate-600"></i>
            <div class="flex-1 text-left">
              <div class="text-sm font-semibold">Report</div>
              <div class="text-xs text-slate-500">Report an issue</div>
            </div>
            <i data-lucide="chevron-right" class="w-5 h-5 text-slate-400"></i>
          </button>
        </div>
      </div>
    </section>

    <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t border-slate-100 z-50">
      <div class="flex items-center justify-around py-2">
        <button class="flex flex-col items-center gap-1 px-4 py-2 rounded-lg text-slate-600">
          <i data-lucide="home" class="w-5 h-5"></i>
          <span class="text-[10px] font-semibold">Home</span>
        </button>
        <button class="flex flex-col items-center gap-1 px-4 py-2 rounded-lg text-slate-600">
          <i data-lucide="trophy" class="w-5 h-5"></i>
          <span class="text-[10px] font-semibold">Rankings</span>
        </button>
        <button class="flex flex-col items-center gap-1 px-4 py-2 rounded-lg text-slate-600">
          <i data-lucide="bookmark" class="w-5 h-5"></i>
          <span class="text-[10px] font-semibold">Library</span>
        </button>
        <button class="flex flex-col items-center gap-1 px-4 py-2 rounded-lg text-sky-600">
          <i data-lucide="user" class="w-5 h-5"></i>
          <span class="text-[10px] font-semibold">Profile</span>
        </button>
      </div>
    </nav>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
