<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empty Author Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #ffffff;
        }

        .empty-author-dashboard {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 40px;
            text-align: center;
            min-height: 100vh;
        }

        .empty-author-icon {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 72px;
            height: 72px;
            margin-bottom: 24px;
            background-color: #f1f5f9;
            border-radius: 14px;
        }

        .empty-author-icon svg {
            width: 36px;
            height: 36px;
        }

        .empty-author-title {
            font-size: 22px;
            font-weight: 600;
            color: #1e293b;
            margin: 0 0 10px 0;
            line-height: 1.3;
        }

        .empty-author-subtitle {
            font-size: 15px;
            color: #64748b;
            margin: 0 0 28px 0;
            line-height: 1.5;
        }

        .create-novel-btn {
            background-color: #0ea5e9;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            padding: 13px 28px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .create-novel-btn:active {
            background-color: #0369a1;
            transform: scale(0.98);
        }

        @media (max-width: 480px) {
            .empty-author-dashboard {
                padding: 60px 24px;
            }

            .empty-author-title {
                font-size: 20px;
            }

            .empty-author-subtitle {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="empty-author-dashboard">
        <div class="empty-author-icon">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 20h9"/>
                <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
            </svg>
        </div>
        <h3 class="empty-author-title">No novels created yet</h3>
        <p class="empty-author-subtitle">Start your writing journey by creating your first novel.</p>
        <button class="create-novel-btn" onclick="handleCreateNovel()">Create your first novel</button>
    </div>

    <script>
        function handleCreateNovel() {
            console.log('Navigate to create novel page');
            // Add your navigation logic here
        }
    </script>
</body>
</html>
