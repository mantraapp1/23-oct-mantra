<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No Results Found</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #ffffff;
        }

        .no-results {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 40px;
            text-align: center;
            min-height: 100vh;
        }

        .no-results-icon {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 72px;
            height: 72px;
            margin-bottom: 24px;
            background-color: #f1f5f9;
            border-radius: 14px;
        }

        .no-results-icon svg {
            width: 36px;
            height: 36px;
        }

        .no-results-title {
            font-size: 22px;
            font-weight: 600;
            color: #1e293b;
            margin: 0 0 10px 0;
            line-height: 1.3;
        }

        .no-results-subtitle {
            font-size: 15px;
            color: #64748b;
            margin: 0 0 28px 0;
            line-height: 1.5;
        }

        .try-again-btn {
            background-color: #0ea5e9;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            padding: 13px 28px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .try-again-btn:active {
            background-color: #0369a1;
            transform: scale(0.98);
        }

        @media (max-width: 480px) {
            .no-results {
                padding: 60px 24px;
            }

            .no-results-title {
                font-size: 20px;
            }

            .no-results-subtitle {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="no-results">
        <div class="no-results-icon">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                <line x1="11" y1="8" x2="11" y2="14"/>
                <line x1="8" y1="11" x2="14" y2="11"/>
            </svg>
        </div>
        <h3 class="no-results-title">No results found</h3>
        <p class="no-results-subtitle">Try adjusting your search terms or explore other novels.</p>
        <button class="try-again-btn" onclick="handleTryAgain()">Browse all novels</button>
    </div>

    <script>
        function handleTryAgain() {
            console.log('Navigate to browse/explore page');
            // Add your navigation logic here
        }
    </script>
</body>
</html>
