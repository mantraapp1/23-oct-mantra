<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WebNovel - Settings</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="font-inter antialiased bg-white text-slate-800">
  <div class="min-h-screen flex flex-col max-w-md mx-auto bg-white">
    <div class="sticky top-0 bg-white z-40 border-b border-slate-100">
      <div class="px-4 py-3 flex items-center gap-2">
        <button class="p-2 rounded-lg hover:bg-slate-100 active:scale-95"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
        <div class="text-base font-semibold">Settings</div>
      </div>
    </div>
    <div class="px-4 pt-4 pb-24 space-y-6">
      <div>
        <div class="text-sm font-semibold mb-2">Account</div>
        <div class="space-y-2">
          <button class="w-full flex items-center justify-between p-3 rounded-xl border border-slate-100 hover:bg-slate-50">
            <span class="text-sm">Email</span>
            <span class="text-xs text-slate-500">you@example.com</span>
          </button>
          <button class="w-full flex items-center justify-between p-3 rounded-xl border border-slate-100 hover:bg-slate-50">
            <span class="text-sm">Account Settings</span>
            <i data-lucide="chevron-right" class="w-4 h-4 text-slate-400"></i>
          </button>
        </div>
      </div>
      <div>
        <div class="text-sm font-semibold mb-2">Preferences</div>
        <div class="space-y-2">
          <div class="flex items-center justify-between p-3 rounded-xl border border-slate-100">
            <span class="text-sm">Push Notifications</span>
            <label class="relative inline-flex items-center cursor-pointer">
              <input type="checkbox" class="sr-only peer" checked>
              <div class="w-9 h-5 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-sky-500"></div>
            </label>
          </div>
          <div class="flex items-center justify-between p-3 rounded-xl border border-slate-100">
            <span class="text-sm">Dark Mode </span>
            <label class="relative inline-flex items-center cursor-pointer">
              <input type="checkbox" class="sr-only peer">
              <div class="w-9 h-5 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-sky-500"></div>
            </label>
          </div>
        </div>
      </div>
      <div>
        <div class="text-sm font-semibold mb-2">About</div>
        <div class="space-y-2">
          <button class="w-full flex items-center justify-between p-3 rounded-xl border border-slate-100 hover:bg-slate-50">
            <span class="text-sm">Terms of Service</span>
            <i data-lucide="chevron-right" class="w-4 h-4 text-slate-400"></i>
          </button>
          <button class="w-full flex items-center justify-between p-3 rounded-xl border border-slate-100 hover:bg-slate-50">
            <span class="text-sm">Privacy Policy</span>
            <i data-lucide="chevron-right" class="w-4 h-4 text-slate-400"></i>
          </button>
          <button class="w-full flex items-center justify-between p-3 rounded-xl border border-slate-100 hover:bg-slate-50">
            <span class="text-sm">Version</span>
            <span class="text-xs text-slate-500">1.0.0</span>
          </button>
        </div>
      </div>
      <button class="w-full py-2.5 rounded-xl border border-rose-200 text-rose-600 text-sm font-semibold hover:bg-rose-50">Log Out</button>
    </div>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
