<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WebNovel - Withdraw Funds</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="font-inter antialiased bg-white text-slate-800">
  <div class="min-h-screen flex flex-col max-w-md mx-auto bg-white">
    <!-- Header -->
    <div class="sticky top-0 bg-white z-40 border-b border-slate-100">
      <div class="px-4 py-3 flex items-center gap-2">
        <button onclick="goBack()" class="p-2 rounded-lg hover:bg-slate-100 active:scale-95"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
        <div class="text-base font-semibold">Withdraw Funds</div>
      </div>
    </div>

    <!-- Main Content -->
    <div class="px-4 pt-4 pb-24 space-y-4">
      <!-- Balance Card -->
      <div class="rounded-xl border border-slate-100 p-4">
        <div class="text-sm text-slate-500 mb-1">Available Balance</div>
        <div class="flex items-baseline gap-2">
          <div class="text-2xl font-semibold">8,150.50</div>
          <div class="text-sm text-slate-500 font-medium">XLM</div>
        </div>
      </div>

      <!-- Amount Input -->
      <div>
        <label class="block text-xs text-slate-500 mb-1">Amount (XLM)</label>
        <div class="relative">
          <input type="number" step="0.0000001" id="amountInput" class="w-full rounded-xl border border-slate-200 px-3 py-2 pr-12 text-sm outline-none focus:ring-2 focus:ring-sky-500 bg-white" placeholder="0.00">
          <div class="absolute right-3 top-1/2 -translate-y-1/2 text-xs font-medium text-slate-400">XLM</div>
        </div>
      </div>

      <!-- Wallet Address Section -->
      <div>
        <div class="flex items-center justify-between mb-1">
          <label class="block text-xs text-slate-500">Stellar Wallet Address</label>
          <button onclick="toggleSavedAddresses()" id="savedBtn" class="text-xs text-sky-500 font-medium flex items-center gap-1 hidden">
            <i data-lucide="bookmark" class="w-3.5 h-3.5"></i>
            <span id="savedCount">0 Saved</span>
          </button>
        </div>
        <input id="walletInput" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-sky-500 bg-white" placeholder="G...">
        
        <!-- Save Address Checkbox -->
        <label class="flex items-center gap-2 mt-2 cursor-pointer">
          <input type="checkbox" id="saveAddressCheckbox" class="w-4 h-4 rounded border-slate-300 text-sky-500 focus:ring-2 focus:ring-sky-500 cursor-pointer">
          <span class="text-xs text-slate-600">Save this address for future use</span>
        </label>

        <!-- Label Input (shown when checkbox is checked) -->
        <div id="labelSection" class="hidden mt-2">
          <input type="text" id="labelInput" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-sky-500 bg-white" placeholder="Label (e.g., Main Wallet)">
        </div>
      </div>

      <!-- Saved Addresses Dropdown -->
      <div id="savedAddressesSection" class="hidden space-y-2">
        <div class="text-xs font-medium text-slate-700 flex items-center gap-1">
          <i data-lucide="bookmark" class="w-3.5 h-3.5"></i>
          Saved Addresses
        </div>
        <div id="savedAddressesList" class="space-y-2">
          <!-- Saved addresses will be dynamically added here -->
        </div>
      </div>

      <!-- Withdrawal Info -->
      <div class="rounded-lg bg-slate-50 p-3 space-y-1">
        <div class="flex justify-between text-xs">
          <span class="text-slate-500">Network Fee</span>
          <span class="font-medium text-slate-700">~0.00001 XLM</span>
        </div>
        <div class="flex justify-between text-xs">
          <span class="text-slate-500">Minimum Withdrawal</span>
          <span class="font-medium text-slate-700">10 XLM</span>
        </div>
      </div>

      <!-- Request Withdrawal Button -->
      <button onclick="requestWithdrawal()" class="w-full rounded-xl bg-sky-500 text-white text-sm font-semibold py-2.5 shadow-sm hover:bg-sky-600 active:scale-[0.98]">Request Withdrawal</button>
    </div>
  </div>

  <!-- Edit Address Modal -->
  <div id="editModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-end justify-center">
    <div class="bg-white rounded-t-3xl w-full max-w-md p-6 space-y-4 animate-slide-up">
      <div class="flex items-center justify-between">
        <h3 class="text-base font-semibold">Edit Address</h3>
        <button onclick="closeEditModal()" class="p-2 rounded-lg hover:bg-slate-100">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <div>
        <label class="block text-xs text-slate-500 mb-1">Label</label>
        <input id="editLabel" type="text" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-sky-500 bg-white" placeholder="e.g., Main Wallet">
      </div>
      <div>
        <label class="block text-xs text-slate-500 mb-1">Address</label>
        <input id="editAddress" type="text" class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-sky-500 bg-white" placeholder="G...">
      </div>
      <button onclick="saveEdit()" class="w-full rounded-xl bg-sky-500 text-white text-sm font-semibold py-2.5 shadow-sm hover:bg-sky-600">Save Changes</button>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div id="deleteModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl w-full max-w-sm p-6 space-y-4">
      <div class="text-center">
        <div class="w-12 h-12 rounded-full bg-red-100 flex items-center justify-center mx-auto mb-3">
          <i data-lucide="trash-2" class="w-6 h-6 text-red-600"></i>
        </div>
        <h3 class="text-base font-semibold mb-1">Delete Address?</h3>
        <p class="text-sm text-slate-500">This action cannot be undone.</p>
      </div>
      <div class="flex gap-2">
        <button onclick="closeDeleteModal()" class="flex-1 rounded-xl border border-slate-200 text-slate-700 text-sm font-semibold py-2.5 hover:bg-slate-50">Cancel</button>
        <button onclick="confirmDelete()" class="flex-1 rounded-xl bg-red-500 text-white text-sm font-semibold py-2.5 hover:bg-red-600">Delete</button>
      </div>
    </div>
  </div>

  <script>
    lucide.createIcons();

    // Initialize saved addresses from localStorage
    let savedAddresses = JSON.parse(localStorage.getItem('walletAddresses') || '[]');
    let editingIndex = null;
    let deletingIndex = null;

    // Update saved count display
    function updateSavedCount() {
      const count = savedAddresses.length;
      document.getElementById('savedCount').textContent = `${count} Saved`;
      if (count === 0) {
        document.getElementById('savedBtn').classList.add('hidden');
      } else {
        document.getElementById('savedBtn').classList.remove('hidden');
      }
    }

    // Toggle label input when checkbox is checked
    document.getElementById('saveAddressCheckbox').addEventListener('change', function() {
      const labelSection = document.getElementById('labelSection');
      if (this.checked) {
        labelSection.classList.remove('hidden');
      } else {
        labelSection.classList.add('hidden');
        document.getElementById('labelInput').value = '';
      }
    });

    // Load saved addresses
    function loadSavedAddresses() {
      const list = document.getElementById('savedAddressesList');
      list.innerHTML = '';
      
      savedAddresses.forEach((addr, index) => {
        const item = document.createElement('div');
        item.className = 'border border-slate-200 rounded-xl p-3 hover:bg-slate-50 transition-colors';
        item.innerHTML = `
          <div class="flex items-start justify-between gap-2">
            <button onclick="useAddress(${index})" class="flex-1 text-left min-w-0">
              <div class="text-xs font-medium text-slate-700 mb-1">${addr.label}</div>
              <div class="text-xs text-slate-500 truncate">${addr.address}</div>
            </button>
            <div class="flex gap-1 flex-shrink-0">
              <button onclick="editAddress(${index})" class="p-1.5 rounded-lg hover:bg-slate-100 active:scale-95" title="Edit">
                <i data-lucide="edit-2" class="w-4 h-4 text-slate-600"></i>
              </button>
              <button onclick="deleteAddress(${index})" class="p-1.5 rounded-lg hover:bg-red-50 active:scale-95" title="Delete">
                <i data-lucide="trash-2" class="w-4 h-4 text-red-500"></i>
              </button>
            </div>
          </div>
        `;
        list.appendChild(item);
      });
      lucide.createIcons();
      updateSavedCount();
    }

    // Toggle saved addresses section
    function toggleSavedAddresses() {
      const section = document.getElementById('savedAddressesSection');
      section.classList.toggle('hidden');
    }

    // Use a saved address
    function useAddress(index) {
      const address = savedAddresses[index].address;
      document.getElementById('walletInput').value = address;
      document.getElementById('savedAddressesSection').classList.add('hidden');
      document.getElementById('saveAddressCheckbox').checked = false;
      document.getElementById('labelSection').classList.add('hidden');
    }

    // Edit address
    function editAddress(index) {
      editingIndex = index;
      const addr = savedAddresses[index];
      document.getElementById('editLabel').value = addr.label;
      document.getElementById('editAddress').value = addr.address;
      document.getElementById('editModal').classList.remove('hidden');
      lucide.createIcons();
    }

    // Save edit
    function saveEdit() {
      const label = document.getElementById('editLabel').value.trim();
      const address = document.getElementById('editAddress').value.trim();
      
      if (!label || !address) {
        alert('Please fill in all fields');
        return;
      }
      
      savedAddresses[editingIndex] = { label, address };
      localStorage.setItem('walletAddresses', JSON.stringify(savedAddresses));
      loadSavedAddresses();
      closeEditModal();
    }

    // Close edit modal
    function closeEditModal() {
      document.getElementById('editModal').classList.add('hidden');
      editingIndex = null;
    }

    // Delete address
    function deleteAddress(index) {
      deletingIndex = index;
      document.getElementById('deleteModal').classList.remove('hidden');
      lucide.createIcons();
    }

    // Confirm delete
    function confirmDelete() {
      savedAddresses.splice(deletingIndex, 1);
      localStorage.setItem('walletAddresses', JSON.stringify(savedAddresses));
      loadSavedAddresses();
      closeDeleteModal();
    }

    // Close delete modal
    function closeDeleteModal() {
      document.getElementById('deleteModal').classList.add('hidden');
      deletingIndex = null;
    }

    // Request withdrawal
    function requestWithdrawal() {
      const amount = parseFloat(document.getElementById('amountInput').value);
      const wallet = document.getElementById('walletInput').value.trim();
      const saveCheckbox = document.getElementById('saveAddressCheckbox').checked;
      const label = document.getElementById('labelInput').value.trim();
      
      if (!amount || amount < 10) {
        alert('Please enter an amount of at least 10 XLM');
        return;
      }
      
      if (!wallet) {
        alert('Please enter a wallet address');
        return;
      }

      // Validate Stellar address format (starts with G and is 56 characters)
      if (!wallet.startsWith('G') || wallet.length !== 56) {
        alert('Please enter a valid Stellar address (starts with G and is 56 characters)');
        return;
      }

      // Save address if checkbox is checked
      if (saveCheckbox) {
        if (!label) {
          alert('Please enter a label for this address');
          return;
        }
        
        // Check if address already exists
        const exists = savedAddresses.some(addr => addr.address === wallet);
        if (!exists) {
          savedAddresses.push({ label, address: wallet });
          localStorage.setItem('walletAddresses', JSON.stringify(savedAddresses));
          loadSavedAddresses();
        }
      }
      
      alert(`Withdrawal request submitted successfully!

Amount: ${amount} XLM
Network Fee: ~0.00001 XLM
Total: ${(amount + 0.00001).toFixed(7)} XLM`);
      
      // Reset form
      document.getElementById('amountInput').value = '';
      document.getElementById('walletInput').value = '';
      document.getElementById('saveAddressCheckbox').checked = false;
      document.getElementById('labelSection').classList.add('hidden');
      document.getElementById('labelInput').value = '';
    }

    // Go back
    function goBack() {
      window.history.back();
    }

    // Load saved addresses on page load
    loadSavedAddresses();
  </script>

  <style>
    @keyframes slide-up {
      from {
        transform: translateY(100%);
      }
      to {
        transform: translateY(0);
      }
    }
    .animate-slide-up {
      animation: slide-up 0.3s ease-out;
    }
  </style>
</body>
</html>
