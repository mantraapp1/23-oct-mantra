<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Edit Novel Info - Mantra</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        
        .genre-btn, .tag-btn, .popular-tag-btn {
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .genre-btn.selected { background-color: #0ea5e9 !important; color: white !important; }
        .genre-btn:not(.selected) { background-color: #f1f5f9; color: #64748b; }
        
        /* Different colored tags */
        .tag-btn { color: white !important; }
        .tag-btn-0 { background-color: #3b82f6 !important; } /* blue */
        .tag-btn-1 { background-color: #8b5cf6 !important; } /* purple */
        .tag-btn-2 { background-color: #ec4899 !important; } /* pink */
        .tag-btn-3 { background-color: #f59e0b !important; } /* amber */
        .tag-btn-4 { background-color: #10b981 !important; } /* green */
        .tag-btn-5 { background-color: #06b6d4 !important; } /* cyan */
        .tag-btn-6 { background-color: #6366f1 !important; } /* indigo */
        .tag-btn-7 { background-color: #14b8a6 !important; } /* teal */
        .tag-btn-8 { background-color: #f97316 !important; } /* orange */
        .tag-btn-9 { background-color: #84cc16 !important; } /* lime */
        
        .popular-tag-btn { background-color: #ffffff; color: #64748b; border: 1px solid #e2e8f0; }
        .popular-tag-btn:hover { background-color: #f8fafc; }
        .popular-tag-btn.added { background-color: #f1f5f9; border-color: #cbd5e1; }
        .genre-btn:active, .tag-btn:active, .popular-tag-btn:active { transform: scale(0.95); }
        .tag-remove-icon { font-size: 16px; line-height: 1; font-weight: 500; }
        
        #coverPreview {
            width: 100px; height: 140px; object-fit: cover; border-radius: 8px;
            border: 2px dashed #cbd5e1; background-color: #f8fafc;
            display: flex; align-items: center; justify-content: center;
        }
        .cover-placeholder {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; width: 100%; height: 100%; color: #94a3b8;
        }
        .cover-placeholder i { width: 32px; height: 32px; margin-bottom: 4px; }
        .cover-placeholder span { font-size: 11px; text-align: center; }
        .error-message { color: #ef4444; font-size: 12px; margin-top: 4px; display: none; }
        input[type="checkbox"]:focus { outline: none !important; box-shadow: none !important; border-color: #cbd5e1 !important; }
    </style>
</head>
<body class="bg-white">
    <div class="min-h-screen max-w-md mx-auto bg-white">
        <!-- Header -->
        <header class="sticky top-0 z-50 bg-white border-b border-slate-100">
            <div class="flex items-center justify-between px-4 py-3">
                <button type="button" onclick="goBack()" class="p-2 -ml-2 rounded-lg hover:bg-slate-100 active:scale-95 transition">
                    <i data-lucide="arrow-left" class="w-5 h-5 text-slate-700"></i>
                </button>
                <h1 class="text-base font-semibold text-slate-900">Edit Novel Info</h1>
                <button type="button" onclick="saveChanges()" class="px-5 py-2 bg-sky-500 text-white text-sm font-medium rounded-lg active:scale-95 transition">
                    Save Changes
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="px-4 py-5 pb-20">
            
            <!-- Cover Image Section -->
            <div class="mb-6">
                <label class="block text-xs font-medium text-slate-500 mb-2.5">Cover Image</label>
                <div class="flex items-start gap-3">
                    <div class="relative">
                        <div id="coverPreview">
                            <div class="cover-placeholder">
                                <i data-lucide="image"></i>
                                <span>Cover<br>Image</span>
                            </div>
                        </div>
                        <img id="coverImage" style="display:none; width: 100px; height: 140px; object-fit: cover; border-radius: 8px; border: 1px solid #e2e8f0;" alt="Cover">
                        <input type="file" id="coverInput" accept="image/*" class="hidden" onchange="handleImageUpload(event)">
                    </div>
                    <button type="button" onclick="document.getElementById('coverInput').click()" class="flex items-center gap-2 px-4 py-2 border border-slate-200 rounded-lg text-sm text-slate-700 hover:bg-slate-50 active:scale-95 transition">
                        <i data-lucide="upload" class="w-4 h-4"></i>
                        Change Cover
                    </button>
                </div>
                <p class="error-message" id="coverError">Cover image is required</p>
            </div>

            <!-- Title Section -->
            <div class="mb-6">
                <label class="block text-xs font-medium text-slate-500 mb-2.5">Title</label>
                <input type="text" id="titleInput" class="w-full px-3 py-2.5 border border-slate-200 rounded-lg text-sm text-slate-900 outline-none focus:ring-2 focus:ring-sky-500 focus:border-transparent transition" placeholder="Enter novel title">
                <p class="error-message" id="titleError">Title is required</p>
            </div>

            <!-- Description Section -->
            <div class="mb-6">
                <label class="block text-xs font-medium text-slate-500 mb-2.5">Description</label>
                <textarea id="descriptionInput" rows="5" class="w-full px-3 py-2.5 border border-slate-200 rounded-lg text-sm text-slate-700 leading-relaxed outline-none focus:ring-2 focus:ring-sky-500 focus:border-transparent transition resize-none" placeholder="Write a compelling description for your novel..."></textarea>
                <p class="error-message" id="descriptionError">Description is required</p>
            </div>

            <!-- Genres Section -->
            <div class="mb-6">
                <label class="block text-xs font-medium text-slate-500 mb-2.5">Genres (select up to 3)</label>
                <div class="flex flex-wrap gap-2">
                    <button type="button" class="genre-btn px-3.5 py-1.5 rounded-full text-sm font-medium" onclick="toggleGenre(this, 'Romance')">Romance</button>
                    <button type="button" class="genre-btn px-3.5 py-1.5 rounded-full text-sm font-medium" onclick="toggleGenre(this, 'Fantasy')">Fantasy</button>
                    <button type="button" class="genre-btn px-3.5 py-1.5 rounded-full text-sm font-medium" onclick="toggleGenre(this, 'Action')">Action</button>
                    <button type="button" class="genre-btn px-3.5 py-1.5 rounded-full text-sm font-medium" onclick="toggleGenre(this, 'Adventure')">Adventure</button>
                    <button type="button" class="genre-btn px-3.5 py-1.5 rounded-full text-sm font-medium" onclick="toggleGenre(this, 'Drama')">Drama</button>
                    <button type="button" class="genre-btn px-3.5 py-1.5 rounded-full text-sm font-medium" onclick="toggleGenre(this, 'Mystery')">Mystery</button>
                    <button type="button" class="genre-btn px-3.5 py-1.5 rounded-full text-sm font-medium" onclick="toggleGenre(this, 'Thriller')">Thriller</button>
                    <button type="button" class="genre-btn px-3.5 py-1.5 rounded-full text-sm font-medium" onclick="toggleGenre(this, 'Isekai')">Isekai</button>
                    <button type="button" class="genre-btn px-3.5 py-1.5 rounded-full text-sm font-medium" onclick="toggleGenre(this, 'Reincarnation')">Reincarnation</button>
                    <button type="button" class="genre-btn px-3.5 py-1.5 rounded-full text-sm font-medium" onclick="toggleGenre(this, 'Slice of Life')">Slice of Life</button>
                    <button type="button" class="genre-btn px-3.5 py-1.5 rounded-full text-sm font-medium" onclick="toggleGenre(this, 'Werewolf')">Werewolf</button>
                    <button type="button" class="genre-btn px-3.5 py-1.5 rounded-full text-sm font-medium" onclick="toggleGenre(this, 'Supernatural')">Supernatural</button>
                    <button type="button" class="genre-btn px-3.5 py-1.5 rounded-full text-sm font-medium" onclick="toggleGenre(this, 'Historical')">Historical</button>
                    <button type="button" class="genre-btn px-3.5 py-1.5 rounded-full text-sm font-medium" onclick="toggleGenre(this, 'Psychological')">Psychological</button>
                    <button type="button" class="genre-btn px-3.5 py-1.5 rounded-full text-sm font-medium" onclick="toggleGenre(this, 'Dystopian')">Dystopian</button>
                    <button type="button" class="genre-btn px-3.5 py-1.5 rounded-full text-sm font-medium" onclick="toggleGenre(this, 'Crime')">Crime</button>
                    <button type="button" class="genre-btn px-3.5 py-1.5 rounded-full text-sm font-medium" onclick="toggleGenre(this, 'Sci-Fi')">Sci-Fi</button>
                    <button type="button" class="genre-btn px-3.5 py-1.5 rounded-full text-sm font-medium" onclick="toggleGenre(this, 'Martial Arts')">Martial Arts</button>
                    <button type="button" class="genre-btn px-3.5 py-1.5 rounded-full text-sm font-medium" onclick="toggleGenre(this, 'Comedy')">Comedy</button>
                    <button type="button" class="genre-btn px-3.5 py-1.5 rounded-full text-sm font-medium" onclick="toggleGenre(this, 'Romantic Fantasy')">Romantic Fantasy</button>
                    <button type="button" class="genre-btn px-3.5 py-1.5 rounded-full text-sm font-medium" onclick="toggleGenre(this, 'Mythology')">Mythology</button>
                </div>
                <p class="error-message" id="genreError">Please select at least one genre (max 3)</p>
            </div>

            <!-- Tags Section -->
            <div class="mb-6">
                <label class="block text-xs font-medium text-slate-500 mb-2.5">Tags (up to 10)</label>
                
                <!-- Added Tags Display -->
                <div id="tagsDisplay" class="mb-2 min-h-[32px] flex flex-wrap gap-2"></div>
                
                <!-- Tag Input with Button -->
                <div class="flex gap-2 mb-3">
                    <input type="text" id="tagInput" class="flex-1 px-3 py-2 border border-slate-200 rounded-lg text-sm text-slate-900 outline-none focus:ring-2 focus:ring-sky-500 focus:border-transparent transition" placeholder="Type a tag..." onkeyup="handleTagKeyUp(event)">
                    <button type="button" onclick="addCustomTag()" class="px-4 py-2 bg-slate-100 text-slate-700 text-sm font-medium rounded-lg hover:bg-slate-200 active:scale-95 transition">Add</button>
                </div>
                
                <!-- Popular Tags -->
                <div class="mb-2">
                    <p class="text-xs font-medium text-slate-500 mb-2">Popular Tags:</p>
                    <div class="flex flex-wrap gap-2">
                        <button type="button" class="popular-tag-btn px-3 py-1.5 rounded-full text-xs font-medium" onclick="addPopularTag('detective')">detective</button>
                        <button type="button" class="popular-tag-btn px-3 py-1.5 rounded-full text-xs font-medium" onclick="addPopularTag('noir')">noir</button>
                        <button type="button" class="popular-tag-btn px-3 py-1.5 rounded-full text-xs font-medium" onclick="addPopularTag('crime')">crime</button>
                        <button type="button" class="popular-tag-btn px-3 py-1.5 rounded-full text-xs font-medium" onclick="addPopularTag('conspiracy')">conspiracy</button>
                        <button type="button" class="popular-tag-btn px-3 py-1.5 rounded-full text-xs font-medium" onclick="addPopularTag('betrayal')">betrayal</button>
                        <button type="button" class="popular-tag-btn px-3 py-1.5 rounded-full text-xs font-medium" onclick="addPopularTag('revenge')">revenge</button>
                        <button type="button" class="popular-tag-btn px-3 py-1.5 rounded-full text-xs font-medium" onclick="addPopularTag('magic')">magic</button>
                        <button type="button" class="popular-tag-btn px-3 py-1.5 rounded-full text-xs font-medium" onclick="addPopularTag('cultivation')">cultivation</button>
                        <button type="button" class="popular-tag-btn px-3 py-1.5 rounded-full text-xs font-medium" onclick="addPopularTag('system')">system</button>
                        <button type="button" class="popular-tag-btn px-3 py-1.5 rounded-full text-xs font-medium" onclick="addPopularTag('transmigration')">transmigration</button>
                    </div>
                </div>
                
                <p class="error-message" id="tagError">You can add up to 10 tags</p>
            </div>

            <!-- Status Section -->
            <div class="mb-6">
                <label class="block text-xs font-medium text-slate-500 mb-2.5">Status</label>
                <select id="statusSelect" class="w-full px-3 py-2.5 border border-slate-200 rounded-lg text-sm text-slate-900 outline-none focus:ring-2 focus:ring-sky-500 focus:border-transparent transition appearance-none bg-white" style="background-image: url('data:image/svg+xml;charset=UTF-8,%3csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%2724%27 height=%2724%27 viewBox=%270 0 24 24%27 fill=%27none%27 stroke=%27%2364748b%27 stroke-width=%272%27 stroke-linecap=%27round%27 stroke-linejoin=%27round%27%3e%3cpolyline points=%276 9 12 15 18 9%27%3e%3c/polyline%3e%3c/svg%3e'); background-repeat: no-repeat; background-position: right 8px center; background-size: 20px; padding-right: 36px;">
                    <option value="">Select status</option>
                    <option value="ongoing">Ongoing</option>
                    <option value="completed">Completed</option>
                    <option value="hiatus">Hiatus</option>
                    <option value="dropped">Dropped</option>
                </select>
                <p class="error-message" id="statusError">Please select a status</p>
            </div>

            <!-- Mature Content Section -->
            <div class="mb-6">
                <label class="flex items-start gap-3 cursor-pointer">
                    <input type="checkbox" id="matureContent" class="mt-0.5 w-4 h-4 rounded border-slate-300 text-sky-500 cursor-pointer" style="outline: none; box-shadow: none;">
                    <span class="text-sm text-slate-700">This novel contains mature content (18+)</span>
                </label>
            </div>

        </main>
    </div>

    <script>
        var selectedGenres = [];
        var tags = [];
        var coverImageUploaded = false;

        window.onload = function() {
            lucide.createIcons();
        };

        function handleTagKeyUp(e) {
            if (e.key === 'Enter' || e.keyCode === 13) {
                e.preventDefault();
                addCustomTag();
            }
        }

        function toggleGenre(button, genre) {
            if (button.classList.contains('selected')) {
                button.classList.remove('selected');
                selectedGenres = selectedGenres.filter(function(g) { return g !== genre; });
            } else {
                if (selectedGenres.length >= 3) {
                    document.getElementById('genreError').textContent = 'You can only select up to 3 genres';
                    document.getElementById('genreError').style.display = 'block';
                    setTimeout(function() { document.getElementById('genreError').style.display = 'none'; }, 3000);
                    return;
                }
                button.classList.add('selected');
                selectedGenres.push(genre);
            }
            if (selectedGenres.length > 0) document.getElementById('genreError').style.display = 'none';
        }

        function addCustomTag() {
            var input = document.getElementById('tagInput');
            var tag = input.value.trim();
            
            if (!tag) return;
            if (tags.length >= 10) {
                document.getElementById('tagError').style.display = 'block';
                setTimeout(function() { document.getElementById('tagError').style.display = 'none'; }, 3000);
                return;
            }
            if (tags.indexOf(tag) !== -1) {
                input.value = '';
                return;
            }
            
            tags.push(tag);
            input.value = '';
            renderTags();
            updatePopularTags();
        }

        function addPopularTag(tag) {
            if (tags.length >= 10) {
                document.getElementById('tagError').style.display = 'block';
                setTimeout(function() { document.getElementById('tagError').style.display = 'none'; }, 3000);
                return;
            }
            if (tags.indexOf(tag) !== -1) return;
            
            tags.push(tag);
            renderTags();
            updatePopularTags();
        }

        function renderTags() {
            var html = '';
            for (var i = 0; i < tags.length; i++) {
                var colorClass = 'tag-btn-' + (i % 10);
                html += '<button type="button" class="tag-btn ' + colorClass + ' px-3.5 py-1.5 rounded-full text-sm font-medium" onclick="removeTag(' + i + ')">' + tags[i] + ' <span class="tag-remove-icon">×</span></button>';
            }
            document.getElementById('tagsDisplay').innerHTML = html;
        }

        function removeTag(index) {
            tags.splice(index, 1);
            renderTags();
            updatePopularTags();
        }

        function updatePopularTags() {
            var buttons = document.querySelectorAll('.popular-tag-btn');
            buttons.forEach(function(btn) {
                var tag = btn.textContent.trim();
                if (tags.indexOf(tag) !== -1) {
                    btn.classList.add('added');
                } else {
                    btn.classList.remove('added');
                }
            });
        }

        function handleImageUpload(event) {
            var file = event.target.files[0];
            if (!file) return;
            if (!file.type.startsWith('image/')) {
                document.getElementById('coverError').textContent = 'Please upload an image file';
                document.getElementById('coverError').style.display = 'block';
                return;
            }
            if (file.size > 5 * 1024 * 1024) {document.getElementById('coverError').textContent = 'Image size should be less than 5MB';
                document.getElementById('coverError').style.display = 'block';
                return;
            }
            
            var reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('coverPreview').style.display = 'none';
                var img = document.getElementById('coverImage');
                img.src = e.target.result;
                img.style.display = 'block';
                coverImageUploaded = true;
                document.getElementById('coverError').style.display = 'none';
            };
            reader.readAsDataURL(file);
        }

        function validateForm() {
            var isValid = true;
            document.querySelectorAll('.error-message').forEach(function(err) { err.style.display = 'none'; });
            
            if (!coverImageUploaded) { document.getElementById('coverError').style.display = 'block'; isValid = false; }
            if (!document.getElementById('titleInput').value.trim()) { document.getElementById('titleError').style.display = 'block'; isValid = false; }
            if (!document.getElementById('descriptionInput').value.trim()) { document.getElementById('descriptionError').style.display = 'block'; isValid = false; }
            if (selectedGenres.length === 0) { document.getElementById('genreError').style.display = 'block'; isValid = false; }
            if (!document.getElementById('statusSelect').value) { document.getElementById('statusError').style.display = 'block'; isValid = false; }
            
            return isValid;
        }

        function saveChanges() {
            if (!validateForm()) return;
            
            var novelData = {
                title: document.getElementById('titleInput').value.trim(),
                description: document.getElementById('descriptionInput').value.trim(),
                genres: selectedGenres,
                tags: tags,
                status: document.getElementById('statusSelect').value,
                matureContent: document.getElementById('matureContent').checked,
                coverImage: document.getElementById('coverImage').src
            };
            
            console.log('Novel Data:', novelData);
            localStorage.setItem('novelData', JSON.stringify(novelData));
            alert('✓ Saved successfully!');
        }

        function goBack() {
            window.history.back();
        }
    </script>
</body>
</html>
